[package]
name = "chan-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "HTTP + WebSocket surface for chan, wrapping chan-core in axum routes."

[lib]
name = "chan_server"

[features]
default = ["embeddings"]
# Forwards to chan-core's `embeddings` feature so the about-pane's
# "embeddings on" badge reflects the actual build. Opt out via
# `--no-default-features` along the rest of the stack.
embeddings = ["chan-core/embeddings"]

[dependencies]
chan-core = { workspace = true, default-features = false }
chan-llm = { workspace = true }
anyhow = { workspace = true }
axum = { workspace = true }
dirs = "5"
rand = "0.8"
rust-embed = "8"
tokio = { workspace = true }
toml = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
