[package]
name = "chan-llm"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
license = "Apache-2.0"
description = "LLM backends, prompts, and tool sandbox for chan-writer drives"
repository = "https://github.com/chan-writer/chan-llm"

[dependencies]
chan-core = { path = "../chan-core" }
async-trait = "0.1"
dirs = "5"
futures-util = { version = "0.3", default-features = false }
keyring = "3"
once_cell = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
thiserror = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros"] }
toml = "0.8"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"

[lib]
name = "chan_llm"
crate-type = ["lib"]
