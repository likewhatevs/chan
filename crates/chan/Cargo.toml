[package]
name = "chan"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "chan: notes app with embedded web editor."

[[bin]]
name = "chan"
path = "src/main.rs"

[features]
default = ["embeddings"]
# Forwards to chan-server / chan-drive's `embeddings` feature so a
# top-level `--no-default-features` build disables the candle stack
# all the way down. Default-on; opt out (`--no-default-features`)
# only for platforms where candle-core won't build (currently iOS).
embeddings = ["chan-server/embeddings", "chan-drive/embeddings"]

[dependencies]
chan-drive = { workspace = true, default-features = false }
chan-server = { path = "../chan-server", default-features = false }
# Pulled in directly (not just transitively through chan-server) so
# the `__mcp` subcommand can run chan-llm's MCP server in-process.
# The `mcp` feature pulls rmcp + schemars; that's the cost of paying
# the v2 ClaudeCli wiring (issue chan-llm#1) into the single static
# binary instead of shipping a separate `chan-llm-mcp` companion.
chan-llm = { workspace = true, features = ["mcp"] }
clap = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# macOS auto-wires candle's Metal backend so the default release
# binary uses the GPU for embeddings without a feature flag. The
# `metal` feature is target-gated on chan-drive (objc2-metal is
# Apple-only); declaring it here keeps Linux/Windows builds clean
# while macOS gets it transparently.
[target.'cfg(target_os = "macos")'.dependencies]
chan-drive = { workspace = true, default-features = false, features = ["metal"] }
chan-server = { path = "../chan-server", default-features = false, features = ["metal"] }

# Linux x86_64 auto-wires candle's CUDA backend so the shipped
# release binary uses the GPU for embeddings without a feature flag.
# cudarc 0.19's `fallback-dynamic-loading` is on by default: the
# binary dlopens libcuda at runtime and falls back to CPU when no
# NVIDIA driver is present, so the same artifact runs on hosts
# without a GPU. CHAN_DISABLE_GPU=1 forces CPU at runtime.
#
# Excluded on linux/aarch64 since NVIDIA's Linux ARM CUDA targets
# datacenter (Grace, Jetson) rather than the desktops/servers chan
# runs on; bundling kernels on ARM would be all cost no value.
# Build host needs nvcc to compile candle-kernels; the runtime
# binary doesn't need any CUDA libs installed.
#
# Opt-out: `--no-default-features --features embeddings` for a
# Linux build without the ~30 MB of CUDA PTX blobs.
[target.'cfg(all(target_os = "linux", target_arch = "x86_64"))'.dependencies]
chan-drive = { workspace = true, default-features = false, features = ["cuda"] }
chan-server = { path = "../chan-server", default-features = false, features = ["cuda"] }

# ----- packaging metadata --------------------------------------
#
# Linux .deb (cargo-deb) and .rpm (cargo-generate-rpm) bake from
# these blocks. macOS .pkg is built ad-hoc in the release
# workflow via pkgbuild; no Cargo metadata for it.

[package.metadata.deb]
maintainer = "Alexandre Fiori <fiorix@gmail.com>"
copyright = "2026 Alexandre Fiori"
license-file = ["../../LICENSE", "0"]
extended-description = """
chan is a notes app with an embedded web editor: a CLI plus an
HTTP server that serves a Svelte WYSIWYG editor for plain
markdown drives. Cross-file [[wiki-link]] autocomplete and
BM25 content search included."""
section = "utility"
priority = "optional"
assets = [
    ["target/release/chan", "usr/bin/", "755"],
    ["../../LICENSE", "usr/share/doc/chan/LICENSE", "644"],
    ["../../README.md", "usr/share/doc/chan/README.md", "644"],
]

[package.metadata.generate-rpm]
license = "Apache-2.0"
summary = "Notes app with embedded web editor"
# cargo-generate-rpm resolves asset `source` paths relative to
# the package directory (`crates/chan/`), unlike cargo-deb which
# is workspace-aware. The binary lives at the workspace target
# (`../../target/...`); we climb out of crates/chan/ to find it.
# `--target X` swaps in `target/X/release/chan` automatically.
assets = [
    { source = "../../target/release/chan", dest = "/usr/bin/chan", mode = "755" },
    { source = "../../LICENSE", dest = "/usr/share/doc/chan/LICENSE", mode = "644", doc = true },
    { source = "../../README.md", dest = "/usr/share/doc/chan/README.md", mode = "644", doc = true },
]
