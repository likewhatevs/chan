# profile-service: internal user/identity/workspace store in front of Postgres.
# Not public; only sibling gateway services call it. Migrates on boot, so it
# restarts until Postgres is reachable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chan-gateway-profile
  labels:
    app.kubernetes.io/name: profile
    app.kubernetes.io/part-of: chan-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: profile
  template:
    metadata:
      labels:
        app.kubernetes.io/name: profile
        app.kubernetes.io/part-of: chan-gateway
    spec:
      containers:
        - name: profile
          image: chan-gateway-profile:dev
          # BIND_ADDR=0.0.0.0:7001 is baked into the image; config + tokens come
          # from the shared ConfigMap/Secret (only the keys profile reads apply).
          envFrom:
            - configMapRef: { name: chan-gateway-config }
            - secretRef: { name: chan-gateway-secrets }
          ports:
            - containerPort: 7001
          readinessProbe:
            httpGet: { path: /healthz, port: 7001 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 7001 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chan-gateway-profile
  labels:
    app.kubernetes.io/part-of: chan-gateway
spec:
  selector:
    app.kubernetes.io/name: profile
  ports:
    - name: http
      port: 7001
      targetPort: 7001
