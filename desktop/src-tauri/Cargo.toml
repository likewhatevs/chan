[package]
name = "chan-desktop"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Desktop edition of the chan markdown editor."
license.workspace = true
repository.workspace = true
homepage = "https://chan.app"
readme = "../README.md"
keywords = ["markdown", "editor", "tauri", "notes", "chan"]
categories = ["text-editors", "gui"]
publish = false

[[bin]]
name = "chan-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { workspace = true, features = [] }

[dependencies]
tauri = { workspace = true, features = ["devtools"] }
tauri-plugin-deep-link = { workspace = true }
tauri-plugin-dialog = { workspace = true }
tauri-plugin-opener = { workspace = true }
tauri-plugin-process = { workspace = true }
tauri-plugin-updater = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
dirs = { workspace = true }
chan-drive = { workspace = true, default-features = false }
chan-server = { path = "../../crates/chan-server" }
notify = { workspace = true }
notify-debouncer-mini = { workspace = true }
keyring = { workspace = true }
getrandom = { workspace = true }
gethostname = { workspace = true }
reqwest = { workspace = true }

# Embed chan-tunnel-server so a remote `chan serve --tunnel-url`
# registers as a drive in the desktop Drives window.
chan-tunnel-server = { workspace = true }
chan-tunnel-proto = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
http = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "sync", "time", "process"] }
tokio-util = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }
semver = { workspace = true }
rust-embed = "8"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-app-kit = { version = "0.3", default-features = false, features = ["std", "NSApplication", "NSEvent", "NSGraphicsContext", "NSResponder", "NSView", "NSWindow"] }
objc2-foundation = { version = "0.3", default-features = false, features = ["std", "NSGeometry", "NSString", "objc2-core-foundation"] }

[dev-dependencies]
chan-tunnel-client = { workspace = true }
tempfile = { workspace = true }
