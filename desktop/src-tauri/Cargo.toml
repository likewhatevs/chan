[package]
name = "chan-desktop"
version = "0.1.0"
edition = "2021"
rust-version = "1.95"
description = "Desktop edition of the chan markdown editor."
license = "Apache-2.0"
repository = "https://github.com/chan-writer/chan-desktop"
homepage = "https://chan.app"
readme = "../README.md"
keywords = ["markdown", "editor", "tauri", "notes", "chan"]
categories = ["text-editors", "gui"]
publish = false

[[bin]]
name = "chan-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-deep-link = "2"
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
dirs = "5"
notify = "6"
notify-debouncer-mini = "0.4"
keyring = { version = "3", features = ["apple-native", "windows-native", "linux-native"] }
getrandom = "0.2"
gethostname = "1"

# Tunnel: embed chan-tunnel-server so a remote `chan serve --tunnel-url`
# (delivered over SSH `-R 7777:localhost:7777`) registers as a drive
# in Drive Manager. Path deps point at the sibling chan-core checkout.
chan-tunnel-server = { path = "../../chan-core/crates/chan-tunnel-server" }
chan-tunnel-proto = { path = "../../chan-core/crates/chan-tunnel-proto" }
async-trait = "0.1"
axum = "0.7"
tower = "0.5"
http = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "time", "process"] }
tokio-util = "0.7"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
semver = "1"

[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", default-features = false, features = ["signal"] }

[dev-dependencies]
chan-tunnel-client = { path = "../../chan-core/crates/chan-tunnel-client" }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
