[[set]]
identifier = "main-window"
description = "Allows the launcher window to call Chan Desktop app commands."
permissions = [
  "allow-list-workspaces",
  "allow-add-workspace",
  "allow-remove-workspace",
  "allow-set-workspace-on",
  "allow-get-config",
  "allow-home-dir",
  "allow-reveal-in-finder",
  "allow-reload-window",
  "allow-open-devtools",
  "allow-zoom-in",
  "allow-zoom-out",
  "allow-zoom-reset",
  "allow-open-local-workspace",
  "allow-add-outbound-workspace",
  "allow-open-outbound-workspace",
  "allow-remove-outbound-workspace",
  "allow-auth-status",
  "allow-open-signin",
  "allow-signout",
  "allow-list-devservers",
  "allow-list-devserver-workspaces",
  "allow-reconnect-devserver",
]

[[set]]
identifier = "workspace-window"
description = "Allows per-workspace windows to call their app commands."
permissions = [
  "allow-reload-window",
  "allow-open-devtools",
  "allow-request-close-window",
  "allow-save-file-to-downloads",
  "allow-zoom-in",
  "allow-zoom-out",
  "allow-zoom-reset",
  "allow-probe-url",
  "allow-platform-os",
  "allow-read-clipboard-text",
  "allow-export-pdf-macos",
]

[[permission]]
identifier = "allow-list-workspaces"
description = "Enables the list_workspaces command."
commands.allow = ["list_workspaces"]

[[permission]]
identifier = "allow-add-workspace"
description = "Enables the add_workspace command."
commands.allow = ["add_workspace"]

[[permission]]
identifier = "allow-remove-workspace"
description = "Enables the remove_workspace command."
commands.allow = ["remove_workspace"]

[[permission]]
identifier = "allow-set-workspace-on"
description = "Enables the set_workspace_on command."
commands.allow = ["set_workspace_on"]

[[permission]]
identifier = "allow-get-config"
description = "Enables the get_config command."
commands.allow = ["get_config"]

[[permission]]
identifier = "allow-home-dir"
description = "Enables the home_dir command."
commands.allow = ["home_dir"]

[[permission]]
identifier = "allow-reveal-in-finder"
description = "Enables the reveal_in_finder command."
commands.allow = ["reveal_in_finder"]

[[permission]]
identifier = "allow-reload-window"
description = "Enables the reload_window command."
commands.allow = ["reload_window"]

[[permission]]
identifier = "allow-open-devtools"
description = "Enables the open_devtools command."
commands.allow = ["open_devtools"]

[[permission]]
identifier = "allow-request-close-window"
description = "Enables the request_close_window command."
commands.allow = ["request_close_window"]

[[permission]]
identifier = "allow-save-file-to-downloads"
description = "Enables the save_file_to_downloads command."
commands.allow = ["save_file_to_downloads"]

[[permission]]
identifier = "allow-zoom-in"
description = "Enables the zoom_in command."
commands.allow = ["zoom_in"]

[[permission]]
identifier = "allow-zoom-out"
description = "Enables the zoom_out command."
commands.allow = ["zoom_out"]

[[permission]]
identifier = "allow-zoom-reset"
description = "Enables the zoom_reset command."
commands.allow = ["zoom_reset"]

[[permission]]
identifier = "allow-open-local-workspace"
description = "Enables the open_local_workspace command."
commands.allow = ["open_local_workspace"]

[[permission]]
identifier = "allow-probe-url"
description = "Enables the probe_url command."
commands.allow = ["probe_url"]

[[permission]]
identifier = "allow-platform-os"
description = "Enables the platform_os command."
commands.allow = ["platform_os"]

[[permission]]
identifier = "allow-read-clipboard-text"
description = "Enables the read_clipboard_text command."
commands.allow = ["read_clipboard_text"]

[[permission]]
identifier = "allow-export-pdf-macos"
description = "Enables the export_pdf_macos command (macOS native PDF export)."
commands.allow = ["export_pdf_macos"]

# Deliberately NOT in the workspace-window set: the macOS drag
# pasteboard is system-wide, so this is granted only to locally-served
# windows via capabilities/local-drop.json (workspace-*, terminal-*) —
# never to the remote-served outbound-* webviews.
[[permission]]
identifier = "allow-read-dropped-paths"
description = "Enables the read_dropped_paths command (drag-pasteboard read at drop time)."
commands.allow = ["read_dropped_paths"]

# Deliberately NOT in the workspace-window set: this command pops a native
# open panel and reads the chosen files' bytes off the user's local disk, so
# it is granted only to locally-served windows via
# capabilities/local-upload.json (workspace-*, terminal-*, local::*) — never to
# the remote-served outbound-* webviews.
[[permission]]
identifier = "allow-pick-upload-files"
description = "Enables the pick_upload_files command (native file picker for `cs upload`)."
commands.allow = ["pick_upload_files"]

[[permission]]
identifier = "allow-add-outbound-workspace"
description = "Enables the add_outbound_workspace command."
commands.allow = ["add_outbound_workspace"]

[[permission]]
identifier = "allow-open-outbound-workspace"
description = "Enables the open_outbound_workspace command."
commands.allow = ["open_outbound_workspace"]

[[permission]]
identifier = "allow-remove-outbound-workspace"
description = "Enables the remove_outbound_workspace command."
commands.allow = ["remove_outbound_workspace"]

[[permission]]
identifier = "allow-auth-status"
description = "Enables the auth_status command."
commands.allow = ["auth_status"]

[[permission]]
identifier = "allow-open-signin"
description = "Enables the open_signin command."
commands.allow = ["open_signin"]

[[permission]]
identifier = "allow-signout"
description = "Enables the signout command."
commands.allow = ["signout"]

[[permission]]
identifier = "allow-list-devservers"
description = "Enables the list_devservers command."
commands.allow = ["list_devservers"]

[[permission]]
identifier = "allow-list-devserver-workspaces"
description = "Enables the list_devserver_workspaces command."
commands.allow = ["list_devserver_workspaces"]

[[permission]]
identifier = "allow-reconnect-devserver"
description = "Enables the reconnect_devserver command."
commands.allow = ["reconnect_devserver"]
