[[set]]
identifier = "main-window"
description = "Allows the launcher window to call Chan Desktop app commands."
permissions = [
  "allow-list-drives",
  "allow-add-drive",
  "allow-remove-drive",
  "allow-set-drive-on",
  "allow-get-drive-features",
  "allow-set-drive-features",
  "allow-compute-drive-preflight",
  "allow-get-config",
  "allow-home-dir",
  "allow-reveal-in-finder",
  "allow-reload-window",
  "allow-open-devtools",
  "allow-zoom-in",
  "allow-zoom-out",
  "allow-zoom-reset",
  "allow-tunnel-status",
  "allow-tunnel-start",
  "allow-tunnel-stop",
  "allow-default-drive-status",
  "allow-choose-default-drive",
  "allow-create-default-drive",
  "allow-factory-reset-default-drive",
  "allow-open-local-drive",
  "allow-open-tunneled-drive",
  "allow-add-outbound-drive",
  "allow-open-outbound-drive",
  "allow-remove-outbound-drive",
  "allow-chan-bin-status",
  "allow-auth-status",
  "allow-open-signin",
  "allow-signout",
]

[[set]]
identifier = "drive-window"
description = "Allows per-drive windows to call their app commands."
permissions = [
  "allow-reload-window",
  "allow-open-devtools",
  "allow-zoom-in",
  "allow-zoom-out",
  "allow-zoom-reset",
]

[[permission]]
identifier = "allow-list-drives"
description = "Enables the list_drives command."
commands.allow = ["list_drives"]

