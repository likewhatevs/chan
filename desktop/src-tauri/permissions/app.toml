[[set]]
identifier = "main-window"
description = "Allows the launcher window to call Chan Desktop app commands."
permissions = [
  "allow-list-workspaces",
  "allow-add-workspace",
  "allow-remove-workspace",
  "allow-set-workspace-on",
  "allow-get-config",
  "allow-home-dir",
  "allow-reveal-in-finder",
  "allow-reload-window",
  "allow-open-devtools",
  "allow-zoom-in",
  "allow-zoom-out",
  "allow-zoom-reset",
  "allow-tunnel-status",
  "allow-tunnel-start",
  "allow-tunnel-stop",
  "allow-default-workspace-status",
  "allow-choose-default-workspace",
  "allow-create-default-workspace",
  "allow-factory-reset-default-workspace",
  "allow-open-local-workspace",
  "allow-open-tunneled-workspace",
  "allow-add-outbound-workspace",
  "allow-open-outbound-workspace",
  "allow-remove-outbound-workspace",
  "allow-chan-bin-status",
  "allow-auth-status",
  "allow-open-signin",
  "allow-signout",
]

[[set]]
identifier = "workspace-window"
description = "Allows per-workspace windows to call their app commands."
permissions = [
  "allow-reload-window",
  "allow-open-devtools",
  "allow-request-close-window",
  "allow-save-file-to-downloads",
  "allow-zoom-in",
  "allow-zoom-out",
  "allow-zoom-reset",
  "allow-probe-url",
]

[[permission]]
identifier = "allow-list-workspaces"
description = "Enables the list_workspaces command."
commands.allow = ["list_workspaces"]

