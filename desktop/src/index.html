<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chan Desktop</title>
  <link rel="icon" type="image/png" href="chan-favicon.png" />
  <link rel="apple-touch-icon" href="chan-favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="bar">
    <div class="brand">
      <span class="enso" aria-hidden="true"></span>
      <b class="brand-title">Workspaces</b>
    </div>
    <div class="actions">
      <!-- @@Alex S1: theme toggle sits BEFORE [New] -> [icon][New]. -->
      <button class="btn icon" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
        <!-- Sun: shown in dark mode (click switches to light) -->
        <svg class="ic-sun" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <!-- Moon: shown in light mode (click switches to dark) -->
        <svg class="ic-moon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <!-- Sign-in kept in the DOM but hidden. -->
      <button class="btn" id="auth-btn" title="Sign in to chan.app" hidden>Sign in</button>
      <button class="btn primary" id="new-workspace" title="Add a workspace">New</button>
    </div>
  </header>

  <main id="main"></main>

  <script src="main.js"></script>
</body>
</html>
