# Workspace manifest for chan: notes app with embedded web editor.
#
# Three crates:
#
#   - chan         the binary. Parses CLI args; dispatches subcommands
#                  (add, list, remove, rename, serve, index, search).
#                  Embeds the web frontend at build time via rust-embed
#                  (wired in a later iteration).
#
#   - chan-server  HTTP + WebSocket surface. Wraps chan-core's Library
#                  / Drive handles in axum routes and serves the
#                  embedded frontend. Migration target for the old
#                  chan-core/src/server.rs in fiorix/chan; routes
#                  port in follow-up commits.
#
#   - chan-llm     LLM backends (Anthropic, Gemini, Ollama), tool
#                  execution sandbox, key resolution (env / keychain /
#                  ~/.config/chan/api-keys.toml). Migration target
#                  for the old chan-core/src/llm/ in fiorix/chan.
#
# chan-core (filesystem, search, graph) lives at the sibling repo
# `chan-writer/chan-core`. The path dep below assumes a sibling
# checkout layout (`~/dev/github.com/chan-writer/{chan,chan-core}`).
# When the repos go public the path becomes a git dep.

[workspace]
resolver = "2"
members = [
    "crates/chan",
    "crates/chan-server",
    "crates/chan-llm",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
license = "Apache-2.0"
repository = "https://github.com/chan-writer/chan"

[workspace.dependencies]
# Core: filesystem, search, graph. Sibling checkout of
# https://github.com/chan-writer/chan-core. Switch to a git or
# crates.io dep when chan-core publishes.
chan-core = { path = "../chan-core" }

anyhow = "1"
axum = { version = "0.7", features = ["ws", "macros"] }
clap = { version = "4", features = ["derive"] }
keyring = "3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
