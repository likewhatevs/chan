# Workspace manifest for chan: notes app with embedded web editor.
#
# Two crates:
#
#   - chan         the binary. Parses CLI args; dispatches subcommands
#                  (add, list, remove, rename, serve, index, search).
#                  Embeds the web frontend at build time via rust-embed
#                  (wired in a later iteration).
#
#   - chan-server  HTTP + WebSocket surface. Wraps chan-core's Library
#                  / Drive handles in axum routes and serves the
#                  embedded frontend. Migration target for the old
#                  chan-core/src/server.rs in fiorix/chan; routes
#                  port in follow-up commits.
#
# chan-core (filesystem, search, graph) and chan-llm (LLM backends,
# prompts, tool sandbox, key resolution) live at sibling repos
# under chan-writer. Both are pulled in as path deps that assume a
# sibling-checkout layout (`~/dev/github.com/chan-writer/{chan,chan-core,chan-llm}`).
# Switch to git or crates.io deps when the repos go public.

[workspace]
resolver = "2"
members = [
    "crates/chan",
    "crates/chan-server",
    "crates/fetch-models",
]

[workspace.package]
version = "0.4.0"
edition = "2021"
rust-version = "1.80"
license = "Apache-2.0"
repository = "https://github.com/chan-writer/chan"

[workspace.dependencies]
# default-features off so each consumer crate can forward chan-core's
# `embeddings` feature through its own gate (chan-server / chan
# declare their own `embeddings` feature that enables this one).
# Without `default-features = false` here, per-crate overrides are
# silently ignored by Cargo.
chan-core = { path = "../chan-core", default-features = false }
chan-llm = { path = "../chan-llm" }
chan-tunnel-client = { path = "../chan-tunnel/crates/chan-tunnel-client" }

anyhow = "1"
axum = { version = "0.7", features = ["ws", "macros", "multipart"] }
clap = { version = "4", features = ["derive", "env"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tar = "0.4"
tempfile = "3"
thiserror = "1"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Defaults pull `zstdmt` for parallel encode, fine on the build
# host (fetch-models). The runtime decode path in chan-server
# only needs single-threaded decode, but pulling the same crate
# avoids two separate native libraries.
zstd = "0.13"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
