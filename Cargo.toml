# Workspace manifest for chan-core. The repo started as a single
# crate; converting to a workspace makes room for sibling crates
# (the chan-tunnel-* libraries) without each needing its own repo.
#
# Members live under crates/. The library crate keeps the bare name
# `chan-core` so existing consumers (notably the chan editor) only
# need to update their dep path, not the import name.

[workspace]
resolver = "2"
members = ["crates/chan-core"]

[workspace.package]
edition = "2021"
rust-version = "1.80"
license = "Apache-2.0"
repository = "https://github.com/chan-writer/chan-core"

[workspace.dependencies]
