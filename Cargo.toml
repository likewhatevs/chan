# Workspace manifest for chan-core. Members live under crates/.
#
# Crate roles:
#
#   - chan-drive           filesystem, search, and graph primitives
#                          for chan drives. Headline crate; named
#                          for the public API (Library + Drive).
#
#   - chan-tunnel-proto    framing types and control frames shared
#                          by client and server. Pure data plus a
#                          minimal codec; no I/O.
#
#   - chan-tunnel-client   embeddable in `chan serve` (and future
#                          native clients) to dial a tunnel terminator
#                          over h2/TLS, run the Hello handshake, and
#                          serve yamux substreams with an axum router.
#
#   - chan-tunnel-server   library form of the tunnel terminator.
#                          Consumed in-process by chan-gateway's
#                          drive-proxy: exposes a Validator trait, a
#                          tunnel listener, and a Registry that maps
#                          (user, drive) -> live yamux connection.
#
#   - chan-llm             LLM backends (Anthropic, Gemini, Ollama,
#                          Claude CLI), embedded prompts, the tool
#                          sandbox the assistant uses to read/edit
#                          chan drives, and the API-key resolution
#                          policy. Optional `mcp` feature exposes a
#                          stdio MCP server + `chan-llm-mcp` binary.
#
# Library crates target tokio + rustls. The tunnel crates also pull
# yamux + h2. All build for Linux, macOS, and (with
# --no-default-features on chan-drive) iOS.

[workspace]
resolver = "2"
members = [
    "crates/chan-drive",
    "crates/chan-tunnel-proto",
    "crates/chan-tunnel-client",
    "crates/chan-tunnel-server",
    "crates/chan-llm",
]

[workspace.package]
version = "0.3.1"
edition = "2021"
rust-version = "1.80"
license = "Apache-2.0"
repository = "https://github.com/chan-writer/chan-core"

[workspace.dependencies]
chan-tunnel-proto = { path = "crates/chan-tunnel-proto" }
chan-tunnel-server = { path = "crates/chan-tunnel-server" }
chan-llm = { path = "crates/chan-llm" }

anyhow = "1"
async-trait = "0.1"
axum = "0.7"
bytes = "1"
dirs = "5"
futures = "0.3"
futures-util = { version = "0.3", default-features = false }
h2 = "0.4"
http = "1"
http-body = "1"
http-body-util = "0.1"
hyper = { version = "1", features = ["http2", "client", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
keyring = "3"
once_cell = "1"
parking_lot = "0.12"
pin-project-lite = "0.2"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
rmcp = { version = "1.6", features = ["transport-io"] }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
rustls-native-certs = "0.8"
rustls-pki-types = "1"
schemars = "1.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
thiserror = "1"
tokio = { version = "1", features = ["full"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring"] }
tokio-util = { version = "0.7", features = ["compat"] }
toml = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }
tracing = "0.1"
url = "2"
uuid = { version = "1", features = ["serde", "v4"] }
yamux = "0.13"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
