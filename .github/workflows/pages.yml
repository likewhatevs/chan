name: Pages

# Manual-only (phase-13 r2): the marketing-site deploy no longer fires on
# push to main. release.yml owns the AUTOMATIC site deploy (it rebuilds
# the marketing site + the /dl release metadata together on every tag),
# so a push to main can no longer race a release deploy and clobber /dl.
# (The old `paths` filter included Cargo.toml, so a release version bump
# auto-fired a marketing deploy concurrent with the release; that deploy's
# preserve:metadata fetched a transient 404 and wiped /dl; the phase-14
# incident record is in git history.) Marketing-only updates between
# releases ship via a deliberate `gh workflow run pages.yml`.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GA vX.Y.Z tag to preserve in /dl metadata (rc/prerelease tags are refused; /dl is GA-only)
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: chan
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install web workspace deps
        run: npm install
        working-directory: chan/web
      - run: npm run check
        working-directory: chan/web/packages/marketing
      - name: Preserve existing release metadata
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          TMPDIR: /var/tmp
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            npm run preserve:metadata -- --tag "$RELEASE_TAG"
          else
            npm run preserve:metadata
          fi
        working-directory: chan/web/packages/marketing
      - uses: actions/upload-pages-artifact@v5
        with:
          path: chan/web/packages/marketing/dist

  deploy:
    name: deploy site
    if: github.ref == 'refs/heads/main' || github.event.inputs.release_tag != ''
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
