name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'web-marketing/**'
      - 'docs/manual/**'
      - 'Cargo.toml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run check
        working-directory: chan/web-marketing
      - uses: actions/upload-pages-artifact@v3
        with:
          path: chan/web-marketing/dist

  deploy:
    name: deploy site
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
