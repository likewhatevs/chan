name: Gateway CI

# The gateway (gateway/) is a separate nested Cargo workspace:
# Postgres-backed, server-side only (linux amd64/arm64), and NOT a
# member of the root chan workspace. The main ci.yml therefore never
# builds or tests it. This gate runs the gateway's own fmt + clippy +
# tests (against a Postgres service) plus the SPA type-check, scoped to
# changes under gateway/. ci.yml carries the mirror-image
# paths-ignore so the two gates do not both run on a given change.

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway-ci.yml'
  pull_request:
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway-ci.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  gate:
    name: gateway gate (linux)
    runs-on: ubuntu-latest

    # Integration tests create a throwaway schema per test under
    # TEST_DATABASE_URL, so the database itself must already exist;
    # POSTGRES_DB seeds it. The pool cap (4/conn per service) plus the
    # pg_reaper keep the shared slot count in bounds under cargo's
    # parallel test runner.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chan
          POSTGRES_PASSWORD: chan
          POSTGRES_DB: chan_gateway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://chan:chan@127.0.0.1:5432/chan_gateway_test

    steps:
      - uses: actions/checkout@v6
        with:
          path: chan

      # The gateway has no rust-toolchain.toml of its own; it inherits
      # the repo-root pin. Copy it to the runner root so the toolchain
      # action installs the same channel CI uses for the core.
      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan/gateway

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chan/web/package-lock.json

      - name: Build SPA + type-check
        # rust-embed bakes gateway/crates/identity/web/dist into the
        # identity binary at compile time, so the bundle MUST exist
        # before any cargo invocation that compiles identity.
        working-directory: chan/web
        run: |
          npm ci
          npm run build -w @chan/profile
          npm run check -w @chan/profile

      - name: fmt
        working-directory: chan/gateway
        run: cargo fmt --check

      - name: clippy
        working-directory: chan/gateway
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: chan/gateway
        run: cargo test
