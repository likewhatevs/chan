# Trigger COPR builds of the distro packages on every release tag.
# COPR's custom webhook rebuilds a package from its configured source
# (the SCM packages build main's HEAD, which a fresh vX.Y.Z tag points
# at). The COPR_WEBHOOK secret holds the project's custom-webhook base
# URL (Settings > Integrations), ending in a trailing slash. PPA
# uploads are NOT automated here: they need the maintainer GPG key,
# which stays local (see packaging/distros/README.md).

name: copr-tag-build

on:
  push:
    tags: ["v*"]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger COPR package builds
        run: |
          curl -sf -X POST "${{ secrets.COPR_WEBHOOK }}chan/"
          curl -sf -X POST "${{ secrets.COPR_WEBHOOK }}chan-desktop/"
