# Publish the distro packages after a release lands: trigger the COPR
# package builds, upload the signed Debian source packages to the Launchpad
# PPA, and publish the Arch source recipes to the AUR. Deliberately a separate workflow from release.yml, and
# triggered by its completion rather than by the tag push, so distro
# publishing can never block or fail the GitHub release and only runs
# once the release is actually out. Retry / manual path: dispatch with
# the tag. Publication jobs no-op gracefully when their secret is absent
# (e.g. on forks).
#
# Secrets:
#   COPR_WEBHOOK                  custom-webhook base URL (trailing /)
#   LAUNCHPAD_GPG_PRIVATE_KEY     armored secret key registered on LP
#   LAUNCHPAD_GPG_PASSPHRASE      its passphrase (empty if none)
#   LAUNCHPAD_SSH_PRIVATE_KEY     optional SSH key registered on LP;
#                                 when present, dput switches from ftp
#                                 to sftp (authenticated, no anonymous
#                                 FTP flakiness); absent keeps ftp
#   AUR_SSH_PRIVATE_KEY           private half of the key registered on
#                                 the maintainer's AUR account

name: distros-publish

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to publish distro packages for
        required: true
      aur_pkgrel:
        description: AUR pkgrel (raise for a packaging-only repair)
        required: false
        default: "1"

# release.yml runs only on tag pushes and workflow_dispatch, so a
# workflow_run whose triggering event is `push` is necessarily a
# tag-triggered release. Gating on event == 'push' (not just a
# v-prefixed head_branch) excludes publish=false dry runs and rc
# validation, which arrive as workflow_dispatch and could otherwise
# publish distro packages off a v-named branch.
jobs:
  copr:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    steps:
      - name: Trigger COPR package builds
        env:
          WEBHOOK: ${{ secrets.COPR_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "COPR_WEBHOOK not set; skipping COPR trigger."
            exit 0
          fi
          # COPR rebuilds the SCM packages from main's HEAD, which equals
          # the tag once the release has landed.
          curl -sf -X POST "${WEBHOOK}chan/"
          curl -sf -X POST "${WEBHOOK}chan-desktop/"

  # Source-package assembly compiles nothing (the vendored tarball is a
  # git archive + prebuilt web bundles + cargo vendor); Launchpad builds
  # offline from it on its own builders.
  launchpad:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    env:
      PPA_SERIES: "noble resolute"
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run checks out the default branch by default; pin the
          # released commit (or the dispatched tag) instead.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debhelper devscripts dpkg-dev dput gnupg jq xz-utils
          # Keeps CI origs shaped like local ones (non-Linux crate
          # payloads pruned); mkdist falls back to plain vendor without it.
          cargo install cargo-vendor-filterer --locked

      - name: Build the vendored source tarball
        run: make distros-tarball

      - name: Import the signing key
        env:
          LP_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          LP_PASS: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          if [ -z "$LP_KEY" ]; then
            echo "LAUNCHPAD_GPG_PRIVATE_KEY not set; skipping PPA upload."
            echo "SKIP_PPA=1" >> "$GITHUB_ENV"
            exit 0
          fi
          GNUPGHOME=$(mktemp -d); chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          export GNUPGHOME
          printf 'allow-loopback-pinentry\nallow-preset-passphrase\n' > "$GNUPGHOME/gpg-agent.conf"
          echo "$LP_KEY" | gpg --batch --import
          gpg-connect-agent /bye >/dev/null 2>&1 || true
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')
          echo "DEBSIGN_KEY=$KEYID" >> "$GITHUB_ENV"
          if [ -n "$LP_PASS" ]; then
            preset="$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase"
            gpg --batch --with-colons --with-keygrip --list-secret-keys \
              | awk -F: '/^grp:/{print $10}' \
              | while read -r grip; do "$preset" --preset "$grip" <<<"$LP_PASS"; done
          fi

      - name: Build and sign the source packages
        if: env.SKIP_PPA != '1'
        run: packaging/distros/debian/build-source.sh

      # Optional sftp transport: with an SSH key provisioned, dput's
      # [ppa] host flips from anonymous ftp (the transient-550 path
      # that has needed manual re-runs) to authenticated sftp. With
      # the secret absent this step configures nothing and the stock
      # ftp stanza stays in effect; upload.sh's skip/retry logic
      # covers both transports.
      - name: Configure dput sftp
        if: env.SKIP_PPA != '1'
        env:
          LP_SSH_KEY: ${{ secrets.LAUNCHPAD_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$LP_SSH_KEY" ]; then
            echo "LAUNCHPAD_SSH_PRIVATE_KEY not set; dput keeps the ftp default."
            exit 0
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LP_SSH_KEY" > ~/.ssh/launchpad
          chmod 600 ~/.ssh/launchpad
          ssh-keyscan -H ppa.launchpad.net >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<'SSHEOF'
          Host ppa.launchpad.net
            User fiorix
            IdentityFile ~/.ssh/launchpad
            IdentitiesOnly yes
          SSHEOF
          # Overrides the stock [ppa] stanza (method = ftp) host-wide;
          # dput resolves ppa:owner/name through this section.
          cat > ~/.dput.cf <<'DPUTEOF'
          [ppa]
          fqdn = ppa.launchpad.net
          method = sftp
          incoming = ~%(ppa)s/ubuntu
          login = fiorix
          allow_unsigned_uploads = 0
          DPUTEOF
          echo "dput will use sftp for the [ppa] host."

      - name: Upload to the PPA
        if: env.SKIP_PPA != '1'
        run: packaging/distros/debian/upload.sh

  # The AUR hosts recipes, not builds. Prove each source package natively on
  # both supported architectures before either repository is updated. x86_64
  # uses upstream Arch; aarch64 imports Arch Linux ARM's signed rootfs on the
  # native GitHub runner. The package build logic is the same script local
  # sdme validation runs.
  aur-validate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            pkgbase: chan
          - os: ubuntu-latest
            arch: x86_64
            pkgbase: chan-desktop
          - os: ubuntu-24.04-arm
            arch: aarch64
            pkgbase: chan
          - os: ubuntu-24.04-arm
            arch: aarch64
            pkgbase: chan-desktop
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
      AUR_PKGREL: ${{ github.event_name == 'workflow_dispatch' && inputs.aur_pkgrel || '1' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

      - name: Prepare Arch build image
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          if [ "$TARGET_ARCH" = x86_64 ]; then
            image=docker.io/archlinux/archlinux:base-devel
            docker pull "$image"
          else
            base=https://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz
            curl -fsSL --retry 3 "$base" -o /tmp/archlinuxarm.tar.gz
            curl -fsSL --retry 3 "$base.sig" -o /tmp/archlinuxarm.tar.gz.sig
            gpg --batch --keyserver hkps://keyserver.ubuntu.com \
              --recv-keys 68B3537F39A313B3E574D06777193F152BDBE6A6
            fingerprint=$(gpg --batch --with-colons --fingerprint \
              68B3537F39A313B3E574D06777193F152BDBE6A6 \
              | awk -F: '$1 == "fpr" { print $10; exit }')
            test "$fingerprint" = 68B3537F39A313B3E574D06777193F152BDBE6A6
            gpg --batch --verify /tmp/archlinuxarm.tar.gz.sig /tmp/archlinuxarm.tar.gz
            image=chan-archlinuxarm:aarch64
            docker import /tmp/archlinuxarm.tar.gz "$image" >/dev/null
          fi
          echo "AUR_IMAGE=$image" >> "$GITHUB_ENV"

      - name: Render, build, install, and smoke
        env:
          PKGBASE: ${{ matrix.pkgbase }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$AUR_PKGREL" =~ ^[1-9][0-9]*$ ]]
          version=${RELEASE_TAG#v}
          mkdir -p target/aur-ci-out
          chmod 0777 target/aur-ci-out
          docker run --rm \
            -e SRC=/src -e OUT=/out -e VERSION="$version" \
            -e PKGREL="$AUR_PKGREL" -e PKGBASE="$PKGBASE" \
            -v "$GITHUB_WORKSPACE:/src:ro" \
            -v "$GITHUB_WORKSPACE/target/aur-ci-out:/out" \
            "$AUR_IMAGE" bash /src/packaging/distros/arch/build-in-container.sh

      - name: Retain publishable AUR metadata
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v7
        with:
          name: aur-metadata-${{ matrix.pkgbase }}
          path: |
            target/aur-ci-out/${{ matrix.pkgbase }}/PKGBUILD
            target/aur-ci-out/${{ matrix.pkgbase }}/.SRCINFO
          include-hidden-files: true
          if-no-files-found: error

  aur-publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    needs: aur-validate
    strategy:
      fail-fast: false
      matrix:
        pkgbase: [chan, chan-desktop]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
      AUR_PKGREL: ${{ github.event_name == 'workflow_dispatch' && inputs.aur_pkgrel || '1' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: aur-metadata-${{ matrix.pkgbase }}
          path: /tmp/generated

      - name: Push to the AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          PKGBASE: ${{ matrix.pkgbase }}
        run: |
          set -euo pipefail
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "AUR_SSH_PRIVATE_KEY not set; skipping the AUR push."
            echo "SKIP_AUR=1" >> "$GITHUB_ENV"
            exit 0
          fi

          printf '%s\n' "$AUR_SSH_KEY" > /tmp/aur-key
          chmod 600 /tmp/aur-key
          cat > /tmp/aur-known-hosts <<'EOF'
          aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN
          EOF
          export GIT_SSH_COMMAND="ssh -i /tmp/aur-key -o IdentitiesOnly=yes -o UserKnownHostsFile=/tmp/aur-known-hosts -o StrictHostKeyChecking=yes"
          version=${RELEASE_TAG#v}
          git config --global user.name "Alexandre Fiori"
          git config --global user.email "fiorix@gmail.com"
          git clone "ssh://aur@aur.archlinux.org/$PKGBASE.git" /tmp/aur
          cp /tmp/generated/{PKGBUILD,.SRCINFO} /tmp/aur/
          cd /tmp/aur
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "$PKGBASE is already at $version-$AUR_PKGREL; nothing to push."
            exit 0
          fi
          git commit -m "upgpkg: $PKGBASE $version-$AUR_PKGREL"
          git push origin HEAD:master

      - name: Verify AUR metadata
        if: env.SKIP_AUR != '1'
        env:
          PKGBASE: ${{ matrix.pkgbase }}
        run: |
          set -euo pipefail
          expected="${RELEASE_TAG#v}-$AUR_PKGREL"
          for attempt in 1 2 3 4 5 6; do
            if curl -fsSL --retry 3 "https://aur.archlinux.org/rpc/v5/info/$PKGBASE" \
              | jq -e --arg expected "$expected" \
                '.resultcount == 1 and .results[0].Version == $expected' >/dev/null; then
              echo "$PKGBASE $expected is visible in the AUR."
              exit 0
            fi
            [ "$attempt" -lt 6 ] && sleep 10
          done
          echo "error: AUR did not report $PKGBASE $expected" >&2
          exit 1
