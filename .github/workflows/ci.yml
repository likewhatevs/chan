name: CI

# Toolchain version is pinned in rust-toolchain.toml; CI uses
# actions-rust-lang/setup-rust-toolchain to read it.
# The frontend bundle (web/dist/) is NOT built in CI today.
# rust-embed accepts an empty dist (build.rs creates the dir if
# missing) so the cargo build still succeeds; the `chan serve`
# binary just serves a "build the frontend first" 404 for the
# SPA shell. Adding `npm install + npm run build` to CI is a
# follow-up if we want to gate on bundle-build success too.
#
# Layout note: every cargo job checks the repo into a subdir. That
# moves rust-toolchain.toml off the workspace root, where
# setup-rust-toolchain looks. We `cp` the toolchain file to the
# workspace root before the action runs so the pinned components
# (rustfmt, clippy) get installed.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan
      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --check
        working-directory: chan

  # macOS test/clippy moved to release.yml (gates the macOS
  # artifact build on tag push). Per-PR CI is Linux-only to keep
  # GitHub Actions minutes within budget; macOS minutes bill at
  # 10x. Test locally on macOS before tagging.
  test:
    name: clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan
      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: chan
      - run: cargo test --all-targets
        working-directory: chan

      # release.yml builds Windows with `-C target-feature=+crt-static`
      # for a self-contained MSVC binary. v0.5.0..v0.5.4 broke at link
      # time because ort-sys's prebuilt objects expected the dynamic
      # CRT (`__imp_tolower` etc); candle is pure Rust so the link
      # should succeed, but mirror the release flags here so we catch
      # any future regression per-PR instead of per-tag.
      - if: matrix.os == 'windows-latest'
        run: cargo build --release -p chan
        working-directory: chan
        env:
          RUSTFLAGS: -C target-feature=+crt-static

  no-default-features:
    name: build (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan
      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan
      - run: cargo build --no-default-features
        working-directory: chan
