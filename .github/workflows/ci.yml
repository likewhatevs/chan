name: CI

# Toolchain version is pinned in rust-toolchain.toml (single source of
# truth for both this workflow and contributors' local hooks).
# actions-rust-lang/setup-rust-toolchain reads that file. Bumping
# Rust = edit rust-toolchain.toml; CI follows automatically.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --check

  # Linux-only on every push/PR to keep GitHub Actions minutes
  # within budget (macOS bills at 10x). macOS validation happens
  # downstream in chan-writer/chan's release.yml when a tag is
  # cut; test locally on macOS before tagging chan.
  test:
    name: clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets
      # The `mcp` feature pulls rmcp + schemars and gates the
      # chan-llm-mcp binary plus the in-process MCP server module.
      # `cargo {clippy,test} --all-targets` without features skips
      # both, which is how the v0.7.0 const-path description
      # regression in mcp.rs reached main. Run the feature-on path
      # explicitly so future regressions fail CI.
      - run: cargo clippy -p chan-llm --all-targets --features mcp -- -D warnings
      - run: cargo test -p chan-llm --all-targets --features mcp

  no-default-features:
    name: build (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p chan-drive --no-default-features
