name: CI

# Phase 11 CI calls the same Make targets developers use locally.
# Linux runs the full gate first; macOS runs only after Linux passes
# and stays focused on Rust clippy/tests for OS-specific coverage.

on:
  push:
    branches: [main]
    # The gateway (gateway/) is a separate workspace with its own gate
    # (gateway-ci.yml). Skip the core gate on gateway-only changes; a
    # mixed change still touches non-gateway paths and runs both.
    paths-ignore:
      - 'gateway/**'
  pull_request:
    paths-ignore:
      - 'gateway/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  linux:
    name: make ci-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan

      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chan/web/package-lock.json

      - name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - run: make ci-linux
        working-directory: chan

  macos:
    name: make ci-macos
    needs: linux
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan

      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan

      - run: make ci-macos
        working-directory: chan
