name: CI

# Toolchain version is pinned in rust-toolchain.toml; CI uses
# actions-rust-lang/setup-rust-toolchain to read it.
#
# Cross-repo auth: this repo depends on two private siblings via
# path deps:
#   chan-writer/chan-core  (path = "../chan-core/crates/chan-drive")
#   chan-writer/chan-llm   (path = "../chan-llm")
# CI clones both into sibling directories using a fine-scoped
# Personal Access Token stored as the chan_ci repo
# secret. See README's "Contributing" section for the PAT setup.
#
# The frontend bundle (web/dist/) is NOT built in CI today.
# rust-embed accepts an empty dist (build.rs creates the dir if
# missing) so the cargo build still succeeds; the `chan serve`
# binary just serves a "build the frontend first" 404 for the
# SPA shell. Adding `npm install + npm run build` to CI is a
# follow-up if we want to gate on bundle-build success too.
#
# Layout note: every cargo job checks the main repo into a
# subdir (so cross-repo `path = "../chan-core/..."` deps resolve to
# a sibling clone). That moves rust-toolchain.toml off the
# workspace root, where setup-rust-toolchain looks. We `cp` the
# toolchain file to the workspace root before the action runs
# so the pinned components (rustfmt, clippy) get installed.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan
      # Workspace fmt invokes `cargo metadata` to discover members,
      # which resolves the workspace's path deps. Even though
      # rustfmt itself doesn't need the deps, the metadata step
      # fails if the sibling repos aren't on disk. Same checkouts
      # as the test job.
      - uses: actions/checkout@v4
        with:
          repository: chan-writer/chan-core
          path: chan-core
          token: ${{ secrets.chan_ci }}
      - uses: actions/checkout@v4
        with:
          repository: chan-writer/chan-llm
          path: chan-llm
          token: ${{ secrets.chan_ci }}
      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --check
        working-directory: chan

  # macOS test/clippy moved to release.yml (gates the macOS
  # artifact build on tag push). Per-PR CI is Linux-only to keep
  # GitHub Actions minutes within budget; macOS minutes bill at
  # 10x. Test locally on macOS before tagging.
  test:
    name: clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan
      - uses: actions/checkout@v4
        with:
          repository: chan-writer/chan-core
          path: chan-core
          token: ${{ secrets.chan_ci }}
      - uses: actions/checkout@v4
        with:
          repository: chan-writer/chan-llm
          path: chan-llm
          token: ${{ secrets.chan_ci }}
      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: chan
      - run: cargo test --all-targets
        working-directory: chan

  no-default-features:
    name: build (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan
      - uses: actions/checkout@v4
        with:
          repository: chan-writer/chan-core
          path: chan-core
          token: ${{ secrets.chan_ci }}
      - uses: actions/checkout@v4
        with:
          repository: chan-writer/chan-llm
          path: chan-llm
          token: ${{ secrets.chan_ci }}
      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan
      - run: cargo build --no-default-features
        working-directory: chan
