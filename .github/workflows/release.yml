name: Release

# Triggered on `v*` and `chan-v*` tag pushes (e.g. `v0.1.0`,
# `chan-v0.11.2`) and via manual dispatch for testing. Builds
# five static-leaning binaries + .deb + .rpm + .pkg, attaches
# all artifacts to a GitHub release on tag push.
#
# The `chan-v*` pattern was added 2026-05-21 (ci-11) to restore
# intended behaviour. Phase-8 adopted the `chan-v*` tagging
# convention (chan-v0.11.0, chan-v0.11.1, chan-v0.11.2); the
# original `v*`-only glob silently skipped every phase-8
# release tag, so chan CLI binaries never shipped to the
# corresponding GitHub Releases. Pre-existing `v*` tags
# (v0.6.x through v0.11.0) stay matched for back-compat.
#
# Targets:
#   linux x86_64       glibc dynamic
#   linux aarch64      glibc dynamic
#   macos aarch64      Apple Silicon native (Intel intentionally
#                                            excluded)
#
# Windows targets deferred 2026-05-21 per ci-13 / @@Alex scope
# decision. Restore the two `windows-latest` matrix entries +
# the Authenticode signing path when Windows comes back online.
# See `docs/journals/phase-8/phase-8-bugs.md` "Windows support
# — full re-enable" for the Round-3 follow-up.
#
# Artifacts are unsigned on Linux. Apple Gatekeeper will warn
# on the .pkg until you sign + notarize it with a Developer ID;
# signing is a separate post-build step gated on having the
# certificates loaded as repo secrets.

on:
  push:
    tags:
      - 'v*'
      - 'chan-v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Tag-time validation. ci.yml runs Linux on every PR/push, but
  # tag-only breakage (e.g. tag cut from a state that wasn't on
  # main) can still slip through, and macOS isn't covered by
  # ci.yml at all. So we run Linux first, then macOS, then the
  # build matrix. Linux fails fast and cheap; macOS only spins
  # up if Linux passes (saves 10x minutes on tag-time breakage).
  test-linux:
    name: clippy + test (ubuntu-latest)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan
      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan

      # chan-desktop joined the workspace 2026-05-19; clippy
      # --all-targets pulls its Linux Tauri deps (`webkit2gtk-sys`,
      # `glib-sys`) which need GTK pkg-config. Mirror release-desktop.yml
      # lines 114-123 so the workflows stay symmetric. macOS doesn't
      # need this step (Tauri uses system frameworks); the test-macos
      # job below stays unchanged.
      - name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - run: cargo clippy --all-targets -- -D warnings
        working-directory: chan
      - run: cargo test --all-targets
        working-directory: chan

  test-macos:
    name: clippy + test (macos-latest)
    needs: test-linux
    runs-on: macos-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan
      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: chan
      - run: cargo test --all-targets
        working-directory: chan

  build:
    name: build (${{ matrix.target }})
    needs: test-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binname: chan
            deb_arch: amd64
            rpm: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binname: chan
            deb_arch: arm64
            rpm: true
          # Windows entries dropped 2026-05-21 per ci-13 / @@Alex
          # scope decision. Restore `x86_64-pc-windows-msvc` +
          # `aarch64-pc-windows-msvc` (+ cross_windows_arm flag)
          # when Windows comes back online. The Archive (zip)
          # step below still handles `archive: zip` for any
          # future restored entry.
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binname: chan
            pkg: true
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: chan

      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      # Linux uses gnu (not musl) so we can dynamically link glibc
      # against the host (modern distros, glibc >= 2.31 in practice).
      # candle is pure Rust on CPU; default release artifacts on
      # Linux ship CPU-only. Users who want the CUDA backend build
      # from source with `cargo build --release --features cuda` and
      # supply CUDA Toolkit on both build and runtime hosts.
      - if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      # Frontend bundle is required for the release binary
      # (rust-embed bakes web/dist/ into the artifact). Debug
      # builds tolerate an empty dist; release builds need the
      # real bundle so `chan serve` ships the editor.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chan/web/package-lock.json
      - run: npm ci
        working-directory: chan/web
      - run: npm run build
        working-directory: chan/web

      # Cache the encoded BGE-small bundle (63 MB) so the
      # fetch-models step below skips the HuggingFace download +
      # zstd-19 re-encode on warm cache. Key is content-derived
      # from the fetcher source + the DEFAULT_MODEL constant
      # site, so any model upgrade or fetcher change invalidates
      # automatically. Path matches the bundle's canonical
      # location; rust-embed picks it up at link time.
      #
      # Gated on `--features embed-model` (systacean-6 made the
      # model embed opt-in; default builds drop the bundle and
      # ship a ~25 MB binary). No current matrix entry builds
      # embed-on, so this step + the fetcher invocation below
      # are hardcoded-skipped. When a feature-on lane is added,
      # either set `matrix.embed_model: true` on that entry and
      # change `if: false` to `if: matrix.embed_model`, or flip
      # to `if: true` if the whole workflow goes feature-on.
      - if: false
        name: Cache BGE-small bundle
        id: cache-bge-bundle
        uses: actions/cache@v4
        with:
          path: chan/crates/chan-server/resources/models.tar.zst
          key: bge-bundle-${{ hashFiles('chan/crates/fetch-models/**', 'chan/crates/chan-drive/src/index/config.rs') }}

      # Pre-fetch the default embedding model so chan-server's
      # rust-embed bundles it into the release binary. Adds ~140
      # MB to every artifact but means end users get hybrid search
      # with no network round-trip on first launch (and works in
      # restricted-egress / proxy-only environments). Runs on the
      # host arch (no --target), since fetch-models is just a
      # downloader; the per-target cross-compile below picks up
      # the populated `crates/chan-server/resources/models/` dir
      # at link time.
      #
      # Same `--features embed-model` gate as the cache step
      # above. Composite condition: skip when not building
      # feature-on; also skip when the cache restored the bundle
      # (preserves the ci-5 warm-cache short-circuit). When the
      # gate flips, `steps.cache-bge-bundle.outputs.cache-hit`
      # becomes meaningful again.
      - if: false
        name: Pre-fetch embedded model
        working-directory: chan
        run: cargo run --release -p fetch-models

      - run: cargo build --release --target ${{ matrix.target }} -p chan
        working-directory: chan

      # ----- archive -----
      # tar.gz on linux/mac, zip on windows. Bundle the binary
      # plus LICENSE + README so the user has the legal +
      # quickstart text alongside.
      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p staging
          cp chan/target/${{ matrix.target }}/release/${{ matrix.binname }} staging/
          cp chan/LICENSE chan/README.md staging/
          tar -czf chan-${{ matrix.target }}.tar.gz -C staging .

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item chan/target/${{ matrix.target }}/release/${{ matrix.binname }} staging/
          Copy-Item chan/LICENSE staging/
          Copy-Item chan/README.md staging/
          Compress-Archive -Path staging/* -DestinationPath chan-${{ matrix.target }}.zip

      # ----- linux .deb -----
      # Prebuilt binary; `cargo install cargo-deb` was a few minutes
      # of compile time on every Linux matrix entry.
      - name: Install cargo-deb
        if: matrix.deb_arch
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb
      - name: Build .deb
        if: matrix.deb_arch
        run: cargo deb --no-build --no-strip --target ${{ matrix.target }} -p chan
        working-directory: chan
      - name: Locate .deb
        if: matrix.deb_arch
        id: locate_deb
        run: |
          file=$(ls chan/target/${{ matrix.target }}/debian/*.deb | head -1)
          cp "$file" "./chan-${{ matrix.deb_arch }}.deb"
          echo "path=chan-${{ matrix.deb_arch }}.deb" >> "$GITHUB_OUTPUT"

      # ----- linux .rpm -----
      # Prebuilt binary; same wall-clock motivation as cargo-deb.
      - name: Install cargo-generate-rpm
        if: matrix.rpm
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-generate-rpm
      - name: Stage binary for cargo-generate-rpm
        if: matrix.rpm
        # cargo-generate-rpm reads asset paths verbatim from the
        # [package.metadata.generate-rpm] block; passing --target
        # changes the OUTPUT dir but does NOT swap `target/release`
        # into `target/<target>/release` in the source paths.
        # Stage the cross-compiled binary at the default location
        # so the metadata's `../../target/release/chan` resolves.
        run: |
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/chan target/release/chan
        working-directory: chan
      - name: Build .rpm
        if: matrix.rpm
        run: cargo generate-rpm --target ${{ matrix.target }}
        working-directory: chan/crates/chan
      - name: Locate .rpm
        if: matrix.rpm
        id: locate_rpm
        # cargo-generate-rpm's output path varies based on
        # whether --target was honored (our version writes to
        # the workspace target dir, not under target/<target>/).
        # Search under chan/ broadly and copy whichever .rpm we
        # find. Dump diagnostics if missing so we can fix it
        # without another round trip.
        run: |
          set -e
          file=$(find chan -path '*/generate-rpm/*.rpm' -type f | head -1)
          if [ -z "$file" ]; then
            echo "::error::no .rpm produced anywhere"
            echo "--- chan/target tree ---"
            find chan -type d -name 'generate-rpm' -exec ls -la {} \; || true
            echo "--- any *.rpm under chan ---"
            find chan -name '*.rpm' || true
            exit 1
          fi
          echo "located rpm at: $file"
          cp "$file" "./chan-${{ matrix.deb_arch }}.rpm"
          echo "path=chan-${{ matrix.deb_arch }}.rpm" >> "$GITHUB_OUTPUT"

      # ----- macOS .pkg -----
      # Plain pkgbuild with no signing. Lands the binary at
      # /usr/local/bin/chan and the docs under
      # /usr/local/share/doc/chan/. Identifier is reverse-DNS so
      # a future signed/notarized version can replace this one
      # cleanly.
      - name: Build .pkg
        if: matrix.pkg
        run: |
          mkdir -p pkgroot/usr/local/bin pkgroot/usr/local/share/doc/chan
          cp chan/target/${{ matrix.target }}/release/${{ matrix.binname }} pkgroot/usr/local/bin/chan
          chmod 755 pkgroot/usr/local/bin/chan
          cp chan/LICENSE chan/README.md pkgroot/usr/local/share/doc/chan/
          version=$(awk -F'"' '/^version/ {print $2; exit}' chan/Cargo.toml)
          pkgbuild \
            --root pkgroot \
            --identifier app.chan.cli \
            --version "$version" \
            --install-location / \
            chan-aarch64-macos.pkg

      # ----- upload -----
      - uses: actions/upload-artifact@v4
        with:
          name: chan-${{ matrix.target }}
          path: |
            chan-${{ matrix.target }}.${{ matrix.archive }}
            chan-${{ matrix.deb_arch }}.deb
            chan-${{ matrix.deb_arch }}.rpm
            chan-aarch64-macos.pkg
          if-no-files-found: ignore

  # Tag-pushed runs end with a GitHub release. workflow_dispatch
  # runs skip this so manual tests don't cut releases.
  release:
    name: github release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f

      # The self-upgrade flow in `chan serve` / `chan upgrade` reads
      # `chan.app/dl/latest/VERSION` (text) to discover the current
      # release and `chan.app/dl/v<version>/SHA256SUMS` to verify the
      # downloaded archive. Both files have to be in the GitHub
      # release so chan-prod-setup's bin/fetch-chan-dl.sh can mirror
      # them onto chan.app/dl/. The text file holds the tag stripped
      # of its leading `v`; the SHA256SUMS lines name each artifact
      # as `<hash>  <basename>`.
      - name: Stage VERSION + SHA256SUMS
        run: |
          set -e
          mkdir -p release-extras
          tag=${GITHUB_REF#refs/tags/}
          version=${tag#v}
          printf '%s\n' "$version" > release-extras/VERSION

          # Flatten artifact subdirs so the checksum file lists
          # just basenames; that's what `chan upgrade` looks up.
          mkdir -p flat
          find artifacts -type f -exec cp -n {} flat/ \;
          ( cd flat && sha256sum * | LC_ALL=C sort -k 2 ) \
            > release-extras/SHA256SUMS

          ls -la release-extras
          cat release-extras/SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            release-extras/VERSION
            release-extras/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: false
