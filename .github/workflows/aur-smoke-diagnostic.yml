# Temporary diagnostic for the AUR post-install smoke.
#
# `aur-validate` fails inside the Arch container with "Failed to create
# directory '/run/systemd/': Permission denied" straight after the packaged
# `chan --version` succeeds. The same commands, in the same image, pass on a
# developer workstation as root, as a non-root user through `su`, and as a
# non-root user through `runuser` with the build script's scrubbed environment.
# So the trigger is something about the runner's container environment rather
# than the script, and this job exists to name it.
#
# It reproduces only the smoke, with a stub binary, so it costs a couple of
# minutes instead of a full package build. Delete this workflow once the cause
# is recorded.
name: aur-smoke-diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Probe the smoke commands in the CI Arch image
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/packaging/distros/shared:/u:ro" \
            docker.io/archlinux/archlinux:base-devel bash -s <<'PROBE'
          set +e
          pacman -Sy --noconfirm systemd >/dev/null 2>&1
          printf '#!/bin/sh\nexit 0\n' > /usr/bin/chan; chmod 755 /usr/bin/chan
          install -Dm644 /u/chan-devserver.service \
            /usr/lib/systemd/user/chan-devserver.service
          id builder >/dev/null 2>&1 || useradd -m builder
          U=/usr/lib/systemd/user/chan-devserver.service

          echo "=== environment ==="
          echo "systemd: $(systemd-analyze --version | head -1)"
          echo "whoami: $(whoami)"
          echo "/run:"; ls -ld /run
          echo "/run mount options:"; grep -E ' /run ' /proc/mounts || echo "  (not a separate mount)"
          echo "/run/systemd present: $([ -d /run/systemd ] && echo yes || echo no)"
          echo "/run/systemd/system present: $([ -d /run/systemd/system ] && echo yes || echo no)"
          echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-<unset>}"
          echo "can builder mkdir /run/systemd?"
          runuser -u builder -- mkdir -p /run/systemd 2>&1 && echo "  yes" || echo "  no"
          rmdir /run/systemd 2>/dev/null

          echo "=== systemd-analyze verify, as root ==="
          out=$(systemd-analyze verify "$U" 2>&1); echo "  rc=$? out=[$out]"

          echo "=== systemd-analyze verify, runuser + scrubbed env (what the script does) ==="
          out=$(runuser -u builder -- env -u SUDO_USER -u SUDO_UID -u SUDO_GID \
                -u SUDO_COMMAND HOME=/home/builder USER=builder LOGNAME=builder \
                systemd-analyze verify "$U" 2>&1); echo "  rc=$? out=[$out]"

          echo "=== systemd-analyze verify, su builder ==="
          out=$(su builder -c "systemd-analyze verify $U" 2>&1); echo "  rc=$? out=[$out]"

          echo "=== the stub binary, stderr kept (the other suspect) ==="
          out=$(runuser -u builder -- env HOME=/home/builder USER=builder \
                /usr/bin/chan --version 2>&1); echo "  rc=$? out=[$out]"
          PROBE
