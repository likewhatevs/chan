# Publish every secondary release target after the core release lands:
# Docker Hub images, COPR packages, the Launchpad PPA, and AUR recipes.
# This workflow is deliberately separate from release.yml and triggered
# by its completion, so an external publisher can fail plainly without
# failing the GitHub Release, /dl metadata, or Pages deploy. Each target
# has its own job chain, so one publisher's failure cannot suppress the
# others. Publication jobs no-op gracefully when their secret is absent
# (e.g. on forks).
#
# Manual dispatch mirrors release.yml: `publish` defaults to false,
# which builds and validates without pushing (and probes the PPA/AUR
# credentials; Docker intentionally skips registry auth), while `targets`
# scopes the run to one publisher so retrying a
# transient Launchpad ftp 550 costs one job instead of Docker and the
# Arch builds too. The tag-triggered path runs every secondary target.
#
# Secrets:
#   COPR_WEBHOOK                  custom-webhook base URL (trailing /)
#   LAUNCHPAD_GPG_PRIVATE_KEY     armored secret key registered on LP
#   LAUNCHPAD_GPG_PASSPHRASE      its passphrase (empty if none)
#   LAUNCHPAD_SSH_PRIVATE_KEY     optional SSH key registered on LP;
#                                 when present, dput switches from ftp
#                                 to sftp (authenticated, no anonymous
#                                 FTP flakiness); absent keeps ftp
#   AUR_SSH_PRIVATE_KEY           private half of the key registered
#                                 on the maintainer's AUR account
#   DOCKERHUB_USERNAME            Docker Hub account name
#   DOCKERHUB_TOKEN               scoped Docker Hub access token
# Variable:
#   DOCKERHUB_NAMESPACE           Docker Hub organization/user namespace

name: publish-downstream

permissions:
  contents: read

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z[-rcN] tag; planned only for targets=docker with publish=false
        required: true
      targets:
        description: Which downstream target to run
        required: true
        default: all
        type: choice
        options:
          - all
          - docker
          - copr
          - launchpad
          - aur
      publish:
        description: Push to Docker Hub, COPR, the PPA, and the AUR
        required: true
        default: false
        type: boolean
      aur_pkgrel:
        description: AUR pkgrel (raise for a packaging-only repair)
        required: false
        default: "1"
      aur_validate_arm:
        description: Run aarch64 AUR validation on dispatch (GA observes it)
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-downstream-${{ github.event.workflow_run.head_branch || inputs.tag }}
  cancel-in-progress: false

# release.yml runs only on tag pushes and workflow_dispatch, so a
# workflow_run whose triggering event is `push` is necessarily a
# tag-triggered release. Gating on event == 'push' (not just a
# v-prefixed head_branch) excludes publish=false dry runs and rc
# validation, which arrive as workflow_dispatch and could otherwise
# publish distro packages off a v-named branch.
#
# Every distro job also filters a prerelease version (a `-` in the tag),
# on both the dispatch and workflow_run paths. Release candidates are
# validated on a branch and their tags are not pushed, so this is defense
# in depth: it keeps an rc that did reach a tag out of COPR, the PPA, and
# the AUR, none of which carries a prerelease channel. Docker preserves
# its existing immutable prerelease tag support but never moves `latest`.
jobs:
  # Docker used release.yml's context outputs for these four values. Derive
  # the same contract from this workflow's two event shapes. This job is a
  # Docker prerequisite only: a Docker context/build failure cannot suppress
  # any distro job.
  context:
    name: docker publication context
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       (inputs.targets == 'all' || inputs.targets == 'docker')) ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.context.outputs.publish }}
      tag: ${{ steps.context.outputs.tag }}
      version: ${{ steps.context.outputs.version }}
      prerelease: ${{ steps.context.outputs.prerelease }}
    steps:
      - id: context
        name: Resolve downstream tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
          PUBLISH: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::release tag must use vX.Y.Z or vX.Y.Z-rcN, got $RELEASE_TAG"
            exit 1
          fi
          version=${RELEASE_TAG#v}
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  copr:
    name: COPR ${{ matrix.package }}
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       (inputs.targets == 'all' || inputs.targets == 'copr') &&
       !contains(inputs.tag, '-')) ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       !contains(github.event.workflow_run.head_branch, '-'))
    strategy:
      fail-fast: false
      matrix:
        package: [chan, chan-desktop]
    runs-on: ubuntu-latest
    env:
      PUBLISH: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
    steps:
      # The probe script lives in the repo, so unlike the old fire-and-forget
      # trigger this job checks the release out to run it.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

      # Keep the packages in separate matrix cells: one webhook failure stays
      # red and attributable without suppressing the other package's trigger.
      - name: Trigger COPR ${{ matrix.package }} build
        id: trigger
        env:
          PACKAGE: ${{ matrix.package }}
          WEBHOOK: ${{ secrets.COPR_WEBHOOK }}
        run: |
          set -euo pipefail
          if [ "$PUBLISH" != "true" ]; then
            echo "publish=false; skipping the COPR trigger and its publication probe."
            exit 0
          fi
          if [ -z "$WEBHOOK" ]; then
            echo "COPR_WEBHOOK not set; skipping the POST. The publication probe reports whether that is a fork no-op or a canonical-repository error."
            echo "webhook_present=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # COPR SCM rebuilds main's HEAD (empty committish), so main must stay
          # frozen from the tag push until the probe confirms both packages.
          # Record the POST time so the probe can tell this build from an
          # earlier one, then trigger.
          echo "posted_at=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "webhook_present=1" >> "$GITHUB_OUTPUT"
          curl -sf -X POST "${WEBHOOK}${PACKAGE}/"

      # The 200 on enqueue is not publication. Poll the unauthenticated COPR
      # API until every chroot for this package reports at the released
      # version, and fail on a broken freeze, a failed chroot, or a budget
      # that expires with the build unconfirmed.
      - name: Verify COPR ${{ matrix.package }} publication
        if: ${{ success() && env.PUBLISH == 'true' }}
        env:
          PACKAGE: ${{ matrix.package }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
          POSTED_AT: ${{ steps.trigger.outputs.posted_at }}
          WEBHOOK_PRESENT: ${{ steps.trigger.outputs.webhook_present }}
          CANONICAL: ${{ github.repository == 'fiorix/chan' }}
        run: packaging/distros/copr/verify-copr-publication.sh

  # Source-package assembly compiles nothing (the vendored tarball is a
  # git archive + prebuilt web bundles + cargo vendor); Launchpad builds
  # offline from it on its own builders.
  launchpad:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       (inputs.targets == 'all' || inputs.targets == 'launchpad') &&
       !contains(inputs.tag, '-')) ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       !contains(github.event.workflow_run.head_branch, '-'))
    runs-on: ubuntu-latest
    env:
      PPA_SERIES: "noble resolute"
      PUBLISH: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run checks out the default branch by default; pin the
          # released commit (or the dispatched tag) instead.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debhelper devscripts dpkg-dev dput gnupg jq xz-utils
          # Keeps CI origs shaped like local ones (non-Linux crate
          # payloads pruned); mkdist falls back to plain vendor without it.
          cargo install cargo-vendor-filterer --locked

      - name: Build the vendored source tarball
        run: make distros-tarball

      # A publish=false run still imports the key and signs the sources:
      # that is the dry run's proof that the Launchpad credential works,
      # and it is the same evidence a real upload depends on.
      - name: Import the signing key
        env:
          LP_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          LP_PASS: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          if [ -z "$LP_KEY" ]; then
            echo "LAUNCHPAD_GPG_PRIVATE_KEY not set; skipping PPA upload."
            echo "SKIP_PPA=1" >> "$GITHUB_ENV"
            exit 0
          fi
          GNUPGHOME=$(mktemp -d); chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          export GNUPGHOME
          printf 'allow-loopback-pinentry\nallow-preset-passphrase\n' > "$GNUPGHOME/gpg-agent.conf"
          echo "$LP_KEY" | gpg --batch --import
          gpg-connect-agent /bye >/dev/null 2>&1 || true
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')
          echo "DEBSIGN_KEY=$KEYID" >> "$GITHUB_ENV"
          if [ -n "$LP_PASS" ]; then
            preset="$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase"
            gpg --batch --with-colons --with-keygrip --list-secret-keys \
              | awk -F: '/^grp:/{print $10}' \
              | while read -r grip; do "$preset" --preset "$grip" <<<"$LP_PASS"; done
          fi
          # Marks the key as in place, so the dry-run report can tell a
          # signing failure from a failure upstream of signing and name
          # only what it observed.
          echo "KEY_IMPORTED=1" >> "$GITHUB_ENV"

      # build-source.sh signs with debsign, but it also honors PPA_NOSIGN and
      # exits 0 on an unsigned build, so its exit status alone does not prove
      # a signature. Verify every .dsc and .changes against the imported key:
      # that signature is the entire product of a publish=false run, and it is
      # what Launchpad rejects an upload for lacking.
      - name: Build and sign the source packages
        if: env.SKIP_PPA != '1'
        run: |
          set -euo pipefail
          packaging/distros/debian/build-source.sh
          shopt -s nullglob
          verified=0
          for f in target/distros/ppa/*/*/*_source.changes \
                   target/distros/ppa/*/*/*.dsc; do
            gpg --batch --verify "$f"
            verified=$((verified + 1))
          done
          if [ "$verified" -eq 0 ]; then
            echo "::error::build-source.sh produced no source package to verify"
            exit 1
          fi
          echo "verified $verified signed source-package files."
          echo "SIGNED=1" >> "$GITHUB_ENV"

      # Optional sftp transport: with an SSH key provisioned, dput's
      # [ppa] host flips from anonymous ftp (the transient-550 path
      # that has needed manual re-runs) to authenticated sftp. With
      # the secret absent this step configures nothing and the stock
      # ftp stanza stays in effect; upload.sh's skip/retry logic
      # covers both transports.
      - name: Configure dput sftp
        if: env.SKIP_PPA != '1' && env.PUBLISH == 'true'
        env:
          LP_SSH_KEY: ${{ secrets.LAUNCHPAD_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$LP_SSH_KEY" ]; then
            echo "LAUNCHPAD_SSH_PRIVATE_KEY not set; dput keeps the ftp default."
            exit 0
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LP_SSH_KEY" > ~/.ssh/launchpad
          chmod 600 ~/.ssh/launchpad
          ssh-keyscan -H ppa.launchpad.net >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<'SSHEOF'
          Host ppa.launchpad.net
            User fiorix
            IdentityFile ~/.ssh/launchpad
            IdentitiesOnly yes
          SSHEOF
          # Overrides the stock [ppa] stanza (method = ftp) host-wide;
          # dput resolves ppa:owner/name through this section.
          cat > ~/.dput.cf <<'DPUTEOF'
          [ppa]
          fqdn = ppa.launchpad.net
          method = sftp
          incoming = ~%(ppa)s/ubuntu
          login = fiorix
          allow_unsigned_uploads = 0
          DPUTEOF
          echo "dput will use sftp for the [ppa] host."

      - name: Upload to the PPA
        if: env.SKIP_PPA != '1' && env.PUBLISH == 'true'
        run: packaging/distros/debian/upload.sh

      # The report names only what the steps observed: a dry run that claims
      # work it did not do is worse than no dry run, and so is one that blames
      # a credential a failed earlier step never reached. The markers separate
      # the four outcomes: signature verified, key deliberately absent, key
      # imported but signing failed, and failed before the key.
      #
      # An absent key is the fork contract, where a dry run legitimately proves
      # only the tarball. On the canonical repository it is instead a secret
      # that was deleted, emptied, or scoped away, and the run whose only
      # purpose is to prove the credential before the tag must not end green
      # having proven nothing.
      - name: Report the PPA dry run
        if: ${{ !cancelled() && env.PUBLISH != 'true' }}
        env:
          CANONICAL: ${{ github.repository == 'fiorix/chan' }}
        run: |
          if [ "${SIGNED:-}" = "1" ]; then
            echo "publish=false; the source packages were built and signed but not uploaded."
          elif [ "${SKIP_PPA:-}" = "1" ]; then
            if [ "$CANONICAL" = "true" ]; then
              echo "::error::LAUNCHPAD_GPG_PRIVATE_KEY is absent on the canonical repository; only the vendored source tarball was proven and the PPA credential is unproven."
              exit 1
            fi
            echo "publish=false and LAUNCHPAD_GPG_PRIVATE_KEY is absent; nothing was signed. Only the vendored source tarball was proven."
          elif [ "${KEY_IMPORTED:-}" = "1" ]; then
            echo "::error::the signing key imported but the source packages did not build and sign; the Launchpad credential is unproven."
            exit 1
          else
            echo "::error::the run failed before the signing key was in place, so the failure is upstream of signing (packaging tools, the vendored tarball, or the key import itself); the Launchpad credential is unproven."
            exit 1
          fi

  # The AUR is a git host for recipes: a push publishes immediately and is
  # only as good as the key behind it. Probe the credential in its own
  # short job so a key whose public half is not registered on the AUR
  # account fails here, in a dry run, instead of at publication time when
  # the release is already out.
  aur-auth:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       (inputs.targets == 'all' || inputs.targets == 'aur') &&
       !contains(inputs.tag, '-')) ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       !contains(github.event.workflow_run.head_branch, '-'))
    runs-on: ubuntu-latest
    outputs:
      credential: ${{ steps.probe.outputs.credential }}
    steps:
      - name: Probe the AUR SSH credential
        id: probe
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "::warning::AUR_SSH_PRIVATE_KEY not set; the AUR push will be skipped."
            echo "credential=absent" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          printf '%s\n' 'aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN' > ~/.ssh/aur_known_hosts
          # aur@ runs a restricted shell: a registered key is greeted and
          # then refused an interactive shell (nonzero exit), an
          # unregistered one gets `Permission denied (publickey)`. Match
          # the greeting rather than the exit status. Nothing but the
          # server's own message reaches the log; ssh never echoes key
          # material and -v stays off so it cannot.
          set +e
          greeting="$(ssh -T -o BatchMode=yes -o IdentitiesOnly=yes \
            -o UserKnownHostsFile="$HOME/.ssh/aur_known_hosts" \
            -o StrictHostKeyChecking=yes -i ~/.ssh/aur \
            aur@aur.archlinux.org 2>&1)"
          set -e
          case "$greeting" in
            *"Interactive shell is disabled"*|*"Welcome to AUR"*)
              echo "AUR accepted the credential: $greeting"
              echo "credential=ok" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "$greeting"
              echo "::error::aur.archlinux.org did not accept AUR_SSH_PRIVATE_KEY; a publickey denial means its public half is not registered on the maintainer's AUR account"
              exit 1
              ;;
          esac

  # The AUR hosts recipes, not builds. Prove each source package on a
  # clean upstream Arch container before either repository is updated.
  # The package build logic is the same script local sdme validation
  # runs. This x86_64 job is the v0.73.0 publication gate.
  aur-validate:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       (inputs.targets == 'all' || inputs.targets == 'aur') &&
       !contains(inputs.tag, '-')) ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       !contains(github.event.workflow_run.head_branch, '-'))
    strategy:
      fail-fast: false
      matrix:
        pkgbase: [chan, chan-desktop]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
      AUR_PKGREL: ${{ github.event_name == 'workflow_dispatch' && inputs.aur_pkgrel || '1' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

      - name: Render, build, install, and smoke
        env:
          PKGBASE: ${{ matrix.pkgbase }}
        run: packaging/distros/arch/build-in-ci.sh docker.io/archlinux/archlinux:base-devel

      - name: Retain publishable AUR metadata
        uses: actions/upload-artifact@v7
        with:
          name: aur-metadata-${{ matrix.pkgbase }}
          path: |
            target/aur-ci-out/${{ matrix.pkgbase }}/PKGBUILD
            target/aur-ci-out/${{ matrix.pkgbase }}/.SRCINFO
          include-hidden-files: true
          if-no-files-found: error

  # Arch Linux ARM aarch64 is declared by both recipes. Build it on every
  # successful GA release, using the same package path as x86_64, but observe
  # rather than gate it for v0.73.0. This leg has never completed end to end
  # and cannot be proven before a tag carrying the systemd-analyze fix;
  # v0.72.0 also never reached the AUR. Do not let the unproven first ARM run
  # block the first AUR publication for a second release. Once it passes,
  # v0.74.0 adds aur-validate-arm to aur-publish's needs.
  # Manual dispatches opt in because an ARM run is expensive and a
  # distro-specific diagnostic may not need it.
  #
  # `inputs` (not `github.event.inputs`) is what preserves a boolean
  # input as a Boolean: the raw event payload carries the string "false",
  # which is truthy and would run ARM on every dispatch.
  aur-validate-arm:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       (inputs.targets == 'all' || inputs.targets == 'aur') &&
       inputs.aur_validate_arm &&
       !contains(inputs.tag, '-')) ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       !contains(github.event.workflow_run.head_branch, '-'))
    # Keep evidence failures visible on this job without making a red workflow
    # the expected outcome until ARM joins the AUR publication gate.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        pkgbase: [chan, chan-desktop]
    runs-on: ubuntu-24.04-arm
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
      AUR_PKGREL: ${{ github.event_name == 'workflow_dispatch' && inputs.aur_pkgrel || '1' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

      # Upstream Arch publishes no aarch64 image, so import Arch Linux
      # ARM's signed rootfs on the native runner.
      - name: Import the Arch Linux ARM rootfs
        run: |
          set -euo pipefail
          # os.archlinuxarm.org serves a certificate that does not cover its
          # own hostname, so fetch from certificate-valid mirrors that carry
          # both the rootfs and its signature. The pinned-key gpg verify below
          # is the integrity anchor and runs on whatever the fetch produced;
          # certificate verification is never relaxed to reach a broken host.
          mirrors=(
            https://ca.us.mirror.archlinuxarm.org/os
            https://fl.us.mirror.archlinuxarm.org/os
          )
          fetched=""
          for base in "${mirrors[@]}"; do
            url="$base/ArchLinuxARM-aarch64-latest.tar.gz"
            if curl -fsSL --retry 3 "$url" -o /tmp/archlinuxarm.tar.gz \
              && curl -fsSL --retry 3 "$url.sig" -o /tmp/archlinuxarm.tar.gz.sig; then
              fetched="$base"
              break
            fi
            echo "::warning::$base did not serve both the rootfs and its signature; trying the next mirror"
          done
          if [ -z "$fetched" ]; then
            echo "::error::no Arch Linux ARM mirror served both the rootfs and its signature"
            exit 1
          fi
          echo "Fetched the Arch Linux ARM rootfs from $fetched"
          gpg --batch --keyserver hkps://keyserver.ubuntu.com \
            --recv-keys 68B3537F39A313B3E574D06777193F152BDBE6A6
          fingerprint=$(gpg --batch --with-colons --fingerprint \
            68B3537F39A313B3E574D06777193F152BDBE6A6 \
            | awk -F: '$1 == "fpr" { print $10; exit }')
          test "$fingerprint" = 68B3537F39A313B3E574D06777193F152BDBE6A6
          gpg --batch --verify /tmp/archlinuxarm.tar.gz.sig /tmp/archlinuxarm.tar.gz
          docker import /tmp/archlinuxarm.tar.gz chan-archlinuxarm:aarch64 >/dev/null

      - name: Render, build, install, and smoke
        env:
          PKGBASE: ${{ matrix.pkgbase }}
        run: packaging/distros/arch/build-in-ci.sh chan-archlinuxarm:aarch64

  aur-publish:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       (inputs.targets == 'all' || inputs.targets == 'aur') &&
       !contains(inputs.tag, '-')) ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       !contains(github.event.workflow_run.head_branch, '-'))
    needs: [aur-auth, aur-validate]
    strategy:
      fail-fast: false
      matrix:
        pkgbase: [chan, chan-desktop]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
      AUR_PKGREL: ${{ github.event_name == 'workflow_dispatch' && inputs.aur_pkgrel || '1' }}
      PUBLISH: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
      PUSHABLE: ${{ needs.aur-auth.outputs.credential == 'ok' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: aur-metadata-${{ matrix.pkgbase }}
          path: /tmp/generated

      # aur-auth fails the whole AUR chain on a rejected key, so an unusable
      # credential here means the secret is absent. That is the fork contract,
      # but on the canonical repository a publish=false dispatch exists to
      # prove the credential before the tag, and one that proves nothing must
      # not end green. A publish=true run keeps the documented no-op: it is
      # reporting an outcome, not standing in for the proof.
      - name: Report the AUR dry run
        if: env.PUBLISH != 'true' || env.PUSHABLE != 'true'
        env:
          PKGBASE: ${{ matrix.pkgbase }}
          CANONICAL: ${{ github.repository == 'fiorix/chan' }}
        run: |
          echo "Validated $PKGBASE metadata for ${RELEASE_TAG}-${AUR_PKGREL} and pushed nothing."
          echo "publish=$PUBLISH credential-usable=$PUSHABLE"
          cat /tmp/generated/.SRCINFO
          if [ "$PUBLISH" != "true" ] && [ "$PUSHABLE" != "true" ] && [ "$CANONICAL" = "true" ]; then
            echo "::error::AUR_SSH_PRIVATE_KEY is absent on the canonical repository; the metadata validated but the AUR credential is unproven."
            exit 1
          fi

      - name: Push to the AUR
        id: aur-push
        if: env.PUBLISH == 'true' && env.PUSHABLE == 'true'
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          PKGBASE: ${{ matrix.pkgbase }}
        run: |
          set -euo pipefail
          printf '%s\n' "$AUR_SSH_KEY" > /tmp/aur-key
          chmod 600 /tmp/aur-key
          cat > /tmp/aur-known-hosts <<'EOF'
          aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN
          EOF
          export GIT_SSH_COMMAND="ssh -i /tmp/aur-key -o IdentitiesOnly=yes -o UserKnownHostsFile=/tmp/aur-known-hosts -o StrictHostKeyChecking=yes"
          version=${RELEASE_TAG#v}
          git config --global user.name "Alexandre Fiori"
          git config --global user.email "fiorix@gmail.com"
          git clone "ssh://aur@aur.archlinux.org/$PKGBASE.git" /tmp/aur
          # The clone is the pre-push ground truth: the version the AUR had
          # on master before this run touched it, or nothing for a pkgbase
          # that has never been pushed. The verify step tolerates the RPC
          # index reporting a version at or below it (a not-yet-caught-up
          # index) and reds on anything else.
          pre_push=""
          if [ -f /tmp/aur/.SRCINFO ]; then
            pkgver="$(sed -n 's/^[[:space:]]*pkgver = //p' /tmp/aur/.SRCINFO | head -n1)"
            pkgrel="$(sed -n 's/^[[:space:]]*pkgrel = //p' /tmp/aur/.SRCINFO | head -n1)"
            epoch="$(sed -n 's/^[[:space:]]*epoch = //p' /tmp/aur/.SRCINFO | head -n1)"
            if [ -n "$pkgver" ] && [ -n "$pkgrel" ]; then
              pre_push="${epoch:+$epoch:}$pkgver-$pkgrel"
            fi
          fi
          echo "pre-push-version=$pre_push" >> "$GITHUB_OUTPUT"
          cp /tmp/generated/{PKGBUILD,.SRCINFO} /tmp/aur/
          cd /tmp/aur
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "$PKGBASE is already at $version-$AUR_PKGREL; nothing to push."
            exit 0
          fi
          git commit -m "upgpkg: $PKGBASE $version-$AUR_PKGREL"
          git push origin HEAD:master

      - name: Verify AUR metadata
        if: env.PUBLISH == 'true' && env.PUSHABLE == 'true'
        env:
          PKGBASE: ${{ matrix.pkgbase }}
          PRE_PUSH_VERSION: ${{ steps.aur-push.outputs.pre-push-version }}
        run: |
          set -euo pipefail
          expected="${RELEASE_TAG#v}-$AUR_PKGREL"
          rpc_url="https://aur.archlinux.org/rpc/v5/info/$PKGBASE"
          # The push step is the publication: a zero exit from `git push`
          # means the AUR accepted the ref, and the AUR's own hooks reject
          # a malformed .SRCINFO at push time. The RPC index is a separate,
          # asynchronously populated projection with no freshness
          # guarantee, so this poll is advisory: an index that never
          # catches up inside the budget ends in a warning, not a red. The
          # one red left is the index affirmatively reporting a version
          # that is neither the pushed one nor at or below the pre-push
          # master state, which means the recipe the AUR serves does not
          # correspond to this release.
          budget="${AUR_VERIFY_BUDGET:-600}"
          delay=10
          reported=""
          while :; do
            payload="$(curl -fsSL --retry 3 "$rpc_url" || true)"
            count="$(jq -r '.resultcount // empty' <<<"$payload" 2>/dev/null || true)"
            if [ "$count" = "1" ]; then
              reported="$(jq -r '.results[0].Version // empty' <<<"$payload")"
              if [ "$reported" = "$expected" ]; then
                echo "$PKGBASE $expected is visible in the AUR after ${SECONDS}s."
                exit 0
              fi
              if [ -n "$reported" ]; then
                stale=false
                if [ -n "$PRE_PUSH_VERSION" ]; then
                  newest="$(printf '%s\n%s\n' "$reported" "$PRE_PUSH_VERSION" | sort -V | tail -n1)"
                  if [ "$newest" = "$PRE_PUSH_VERSION" ]; then
                    stale=true
                  fi
                fi
                if [ "$stale" != "true" ]; then
                  echo "::error::the AUR reports $PKGBASE $reported, which is neither the pushed $expected nor at or below the pre-push ${PRE_PUSH_VERSION:-state of a new pkgbase}; the recipe the AUR serves does not match this release"
                  exit 1
                fi
                echo "the AUR still reports $PKGBASE $reported (pre-push state); waiting for $expected"
              fi
            fi
            if [ "$SECONDS" -ge "$budget" ]; then
              break
            fi
            sleep "$delay"
            delay=$((delay * 2))
            if [ "$delay" -gt 60 ]; then
              delay=60
            fi
          done
          echo "::warning::$PKGBASE $expected was pushed but the AUR RPC index reports ${reported:-no result} after ${SECONDS}s; the push is authoritative and the index advisory, check $rpc_url by hand"
          {
            echo "### AUR $PKGBASE: pushed, index confirmation timed out"
            echo
            echo "The recipe was pushed. The RPC index did not report $expected within ${SECONDS}s (last seen: ${reported:-no result}). Manual check: $rpc_url"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---- container images (Docker Hub) ----------------------------------------
  # Publishes chan + the three chan-gateway service images to Docker Hub under
  # ${{ vars.DOCKERHUB_NAMESPACE }}. Multi-arch is built on NATIVE runners
  # (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm, matching the CLI and
  # gateway package jobs): each image runs a full from-scratch cargo build
  # inside its Dockerfile, so emulating aarch64 under QEMU would be far slower.
  # Each arch is pushed BY DIGEST, then docker-manifest assembles the multi-arch
  # manifest list and asserts both platforms. A publish=false dry run BUILDS
  # every image (outputs type=cacheonly) WITHOUT a registry, so it needs no
  # Docker Hub secrets and never moves `latest`. The gateway Dockerfile's single
  # builder stage compiles all four crates once; the four runtime --targets
  # share one gha cache scope per arch. Auth is docker/login-action (no GitHub
  # token scope), so these jobs keep the top-level contents: read. Tag map:
  # immutable X.Y.Z always; `latest` only on a GA tag (prerelease == 'false').
  docker-build:
    name: docker ${{ matrix.component }} (${{ matrix.arch }})
    needs: context
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            component: chan
          - os: ubuntu-24.04-arm
            arch: arm64
            component: chan
          - os: ubuntu-latest
            arch: amd64
            component: gateway
          - os: ubuntu-24.04-arm
            arch: arm64
            component: gateway
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          # workflow_run otherwise checks out the default branch rather than
          # the released commit. A publishing retry pins the requested tag;
          # only a dry run builds the selected workflow ref before that tag exists.
          ref: ${{ github.event_name != 'workflow_dispatch' && github.event.workflow_run.head_sha || (inputs.publish && inputs.tag || github.sha) }}

      # On a real publish the Docker Hub credentials + namespace must exist
      # before any login/push; fail fast with a pointer if not. The dry run
      # (publish=false) skips this and builds without a registry, so secret-less
      # dry runs and forks stay green.
      - name: Verify Docker Hub config present
        if: needs.context.outputs.publish == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
        run: |
          set -e
          missing=()
          [ -n "$DOCKERHUB_USERNAME" ] || missing+=("DOCKERHUB_USERNAME (secret)")
          [ -n "$DOCKERHUB_TOKEN" ] || missing+=("DOCKERHUB_TOKEN (secret)")
          [ -n "$DOCKERHUB_NAMESPACE" ] || missing+=("DOCKERHUB_NAMESPACE (variable)")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing Docker Hub config: ${missing[*]}"
            echo "::error::Create the Docker Hub org + a scoped access token, then add the DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets and the DOCKERHUB_NAMESPACE variable."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: needs.context.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # chan: default target. EMBED_MODEL stays off (the model is fetched at
      # runtime), so no separate model image is published.
      - name: Build chan
        if: matrix.component == 'chan'
        id: build_chan
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packaging/docker/chan.Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          outputs: ${{ needs.context.outputs.publish == 'true' && format('type=image,name={0}/chan,push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true', vars.DOCKERHUB_NAMESPACE) || 'type=cacheonly' }}
          cache-from: type=gha,scope=chan-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=chan-${{ matrix.arch }}

      # gateway: one builder stage compiles all four crates; each runtime
      # --target copies one binary. The four steps share one gha cache scope
      # per arch so the builder compiles once.
      - name: Build chan-gateway-identity
        if: matrix.component == 'gateway'
        id: build_identity
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packaging/docker/gateway.Dockerfile
          target: identity
          platforms: linux/${{ matrix.arch }}
          provenance: false
          outputs: ${{ needs.context.outputs.publish == 'true' && format('type=image,name={0}/chan-gateway-identity,push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true', vars.DOCKERHUB_NAMESPACE) || 'type=cacheonly' }}
          cache-from: type=gha,scope=gateway-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=gateway-${{ matrix.arch }}

      - name: Build chan-gateway-profile
        if: matrix.component == 'gateway'
        id: build_profile
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packaging/docker/gateway.Dockerfile
          target: profile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          outputs: ${{ needs.context.outputs.publish == 'true' && format('type=image,name={0}/chan-gateway-profile,push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true', vars.DOCKERHUB_NAMESPACE) || 'type=cacheonly' }}
          cache-from: type=gha,scope=gateway-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=gateway-${{ matrix.arch }}

      - name: Build chan-gateway-devserver-proxy
        if: matrix.component == 'gateway'
        id: build_devserver_proxy
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packaging/docker/gateway.Dockerfile
          target: devserver-proxy
          platforms: linux/${{ matrix.arch }}
          provenance: false
          outputs: ${{ needs.context.outputs.publish == 'true' && format('type=image,name={0}/chan-gateway-devserver-proxy,push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true', vars.DOCKERHUB_NAMESPACE) || 'type=cacheonly' }}
          cache-from: type=gha,scope=gateway-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=gateway-${{ matrix.arch }}

      - name: Build chan-gateway-devserver-control
        if: matrix.component == 'gateway'
        id: build_devserver_control
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packaging/docker/gateway.Dockerfile
          target: devserver-control
          platforms: linux/${{ matrix.arch }}
          provenance: false
          outputs: ${{ needs.context.outputs.publish == 'true' && format('type=image,name={0}/chan-gateway-devserver-control,push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true', vars.DOCKERHUB_NAMESPACE) || 'type=cacheonly' }}
          cache-from: type=gha,scope=gateway-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=gateway-${{ matrix.arch }}

      # Persist each pushed digest (filename = image.arch, content = digest) so
      # the manifest job can group per image. Skipped on the dry run (no push,
      # no digests).
      - name: Export digests
        if: needs.context.outputs.publish == 'true'
        env:
          ARCH: ${{ matrix.arch }}
          COMPONENT: ${{ matrix.component }}
          CHAN_DIGEST: ${{ steps.build_chan.outputs.digest }}
          IDENTITY_DIGEST: ${{ steps.build_identity.outputs.digest }}
          PROFILE_DIGEST: ${{ steps.build_profile.outputs.digest }}
          DEVSERVER_PROXY_DIGEST: ${{ steps.build_devserver_proxy.outputs.digest }}
          DEVSERVER_CONTROL_DIGEST: ${{ steps.build_devserver_control.outputs.digest }}
        run: |
          set -e
          mkdir -p /tmp/digests
          if [ "$COMPONENT" = "chan" ]; then
            printf '%s' "$CHAN_DIGEST" > "/tmp/digests/chan.${ARCH}"
          else
            printf '%s' "$IDENTITY_DIGEST" > "/tmp/digests/chan-gateway-identity.${ARCH}"
            printf '%s' "$PROFILE_DIGEST" > "/tmp/digests/chan-gateway-profile.${ARCH}"
            printf '%s' "$DEVSERVER_PROXY_DIGEST" > "/tmp/digests/chan-gateway-devserver-proxy.${ARCH}"
            printf '%s' "$DEVSERVER_CONTROL_DIGEST" > "/tmp/digests/chan-gateway-devserver-control.${ARCH}"
          fi
          ls -la /tmp/digests

      - name: Upload digests
        if: needs.context.outputs.publish == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: docker-digests-${{ matrix.component }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: docker manifest ${{ matrix.image }}
    if: needs.context.outputs.publish == 'true'
    needs:
      - context
      - docker-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - chan
          - chan-gateway-identity
          - chan-gateway-profile
          - chan-gateway-devserver-proxy
          - chan-gateway-devserver-control
    steps:
      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: docker-digests-*
          merge-multiple: true

      # Tag map: immutable X.Y.Z always; latest only on a GA release.
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.context.outputs.version }}
            type=raw,value=latest,enable=${{ needs.context.outputs.prerelease == 'false' }}

      - name: Create the multi-arch manifest
        env:
          IMG: ${{ matrix.image }}
          IMAGE: ${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}
        run: |
          set -e
          refs=""
          for f in /tmp/digests/"${IMG}".*; do
            [ -e "$f" ] || continue
            d=$(cat "$f")
            [ -n "$d" ] || { echo "::error::empty digest in $f"; exit 1; }
            refs="$refs ${IMAGE}@${d}"
          done
          if [ -z "$refs" ]; then
            echo "::error::no per-arch digests found for $IMG"
            exit 1
          fi
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          echo "manifest tags: $tags"
          echo "source refs:  $refs"
          # Both hold whitespace-separated argument lists ("-t a -t b" and the
          # per-arch refs), so the split is what turns them into arguments.
          # shellcheck disable=SC2086
          docker buildx imagetools create $tags $refs

      - name: Inspect the manifest (assert both platforms)
        env:
          REF: ${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ needs.context.outputs.version }}
        run: |
          set -e
          out=$(docker buildx imagetools inspect "$REF")
          printf '%s\n' "$out"
          echo "$out" | grep -q 'linux/amd64' || { echo "::error::$REF missing linux/amd64"; exit 1; }
          echo "$out" | grep -q 'linux/arm64' || { echo "::error::$REF missing linux/arm64"; exit 1; }
