name: Desktop Package Dry Run

# Manual package smoke for chan-desktop. The tag-triggered release path lives
# in release.yml so one ordered workflow owns release assets, verification,
# /dl metadata generation, and Pages publication.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: desktop package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x86_64
          - os: macos-latest
            artifact_name: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: chan

      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan

      # Match release.yml: window chrome follows the linked SDK, so
      # build against the newest Xcode on the image (the default is
      # older and ships the legacy opaque titlebar).
      - if: matrix.os == 'macos-latest'
        name: Select newest Xcode (window chrome follows the linked SDK)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)"
          xcodebuild -version
          xcrun --show-sdk-version

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chan/web/package-lock.json

      - if: matrix.os == 'ubuntu-latest'
        name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - if: matrix.os == 'macos-latest'
        name: Verify Apple signing secrets present
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          set -e
          missing=()
          [ -n "$APPLE_CERTIFICATE_BASE64" ] || missing+=("APPLE_CERTIFICATE_BASE64")
          [ -n "$APPLE_CERTIFICATE_PASSWORD" ] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -n "$APPLE_SIGNING_IDENTITY" ] || missing+=("APPLE_SIGNING_IDENTITY")
          [ -n "$APPLE_TEAM_ID" ] || missing+=("APPLE_TEAM_ID")
          [ -n "$APPLE_ID" ] || missing+=("APPLE_ID")
          [ -n "$APPLE_PASSWORD" ] || missing+=("APPLE_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing Apple signing secrets: ${missing[*]}"
            echo "::error::Populate per docs/release/macos-signing.md."
            exit 1
          fi

      - if: matrix.os == 'macos-latest'
        name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - if: matrix.os == 'ubuntu-latest'
        name: Build Linux desktop package
        working-directory: chan
        run: make chan-desktop

      - if: matrix.os == 'macos-latest'
        name: Build signed and notarized macOS desktop package
        working-directory: chan
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: make macos-chan-dmg-notarised

      - uses: actions/upload-artifact@v7
        with:
          name: chan-desktop-${{ matrix.artifact_name }}
          path: chan/target/release/bundle/**/*
          if-no-files-found: error
