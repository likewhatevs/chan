name: Desktop Package Dry Run

# Manual package smoke for chan-desktop. The tag-triggered release path lives
# in release.yml so one ordered workflow owns release assets, verification,
# /dl metadata generation, and Pages publication.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: desktop package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x86_64
          - os: macos-latest
            artifact_name: macos-aarch64
          # Windows desktop dry-run (phase-26): build chan-desktop, bundle the
          # NSIS installer, run a headless boot/health smoke. No Authenticode
          # signing + no Windows updater feed this phase (land + CI-green only).
          - os: windows-latest
            artifact_name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: chan

      - run: cp chan/rust-toolchain.toml ./rust-toolchain.toml
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chan

      # Match release.yml: window chrome follows the linked SDK, so
      # build against the newest Xcode on the image (the default is
      # older and ships the legacy opaque titlebar).
      - if: matrix.os == 'macos-latest'
        name: Select newest Xcode (window chrome follows the linked SDK)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)"
          xcodebuild -version
          xcrun --show-sdk-version

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chan/web/package-lock.json

      - if: matrix.os == 'ubuntu-latest'
        name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - if: matrix.os == 'macos-latest'
        name: Verify Apple signing secrets present
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          set -e
          missing=()
          [ -n "$APPLE_CERTIFICATE_BASE64" ] || missing+=("APPLE_CERTIFICATE_BASE64")
          [ -n "$APPLE_CERTIFICATE_PASSWORD" ] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -n "$APPLE_SIGNING_IDENTITY" ] || missing+=("APPLE_SIGNING_IDENTITY")
          [ -n "$APPLE_TEAM_ID" ] || missing+=("APPLE_TEAM_ID")
          [ -n "$APPLE_ID" ] || missing+=("APPLE_ID")
          [ -n "$APPLE_PASSWORD" ] || missing+=("APPLE_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing Apple signing secrets: ${missing[*]}"
            echo "::error::Populate per docs/release/macos-signing.md."
            exit 1
          fi

      - if: matrix.os == 'macos-latest'
        name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - if: matrix.os == 'ubuntu-latest'
        name: Build Linux desktop package
        working-directory: chan
        run: make chan-desktop

      - if: matrix.os == 'macos-latest'
        name: Build signed and notarized macOS desktop package
        working-directory: chan
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: make macos-chan-dmg-notarised

      - if: matrix.os == 'windows-latest'
        name: Build Windows desktop package (NSIS)
        working-directory: chan
        shell: bash
        run: |
          set -euo pipefail
          # chan-desktop embeds BOTH frontend bundles via rust-embed: web/dist
          # (WebAssets) and web-launcher/dist (LauncherAssets, the launcher /
          # library-root SPA). Both must exist before the Rust crate compiles,
          # else LauncherAssets bakes an empty dir and the launcher window serves
          # the "launcher bundle not built" fallback. Mirrors `make chan-desktop`
          # (its `web` target depends on `web-launcher`).
          (cd web && npm install && npm run build -w @chan/launcher && npm run build -w @chan/workspace-app)
          # Build the console-subsystem `chan.exe` CLI (a real terminal program:
          # `chan devserver` then BLOCKS and takes Ctrl-C, unlike the
          # GUI-subsystem chan-desktop.exe, which detaches when launched from
          # PowerShell). The shims (cs_install.rs) re-point at it when present.
          cargo build --release -p chan
          # NSIS only: the cross-platform `bundle.targets: "all"` would also try
          # the WiX MSI, which needs the WiX toolset we deliberately dropped.
          # `tauri.windows.conf.json` (a deep-merge over tauri.conf.json, Windows
          # only) bundles the chan.exe built just above as a resource; the main
          # conf can't carry it because the file does not exist on macOS/Linux.
          (cd desktop/src-tauri && cargo tauri build --bundles nsis --config tauri.windows.conf.json)

      - if: matrix.os == 'windows-latest'
        name: Headless boot + /api/health smoke
        working-directory: chan
        shell: bash
        run: |
          set -uo pipefail
          # The desktop binary dispatches the chan CLI when its arg0 stem is
          # `chan` (ARGV0 wins over argv[0] — chan_shell::invoked_arg0). Off
          # unix, `chan open <path>` has no desktop GUI to hand off to, so it
          # serves a normal standalone server — the headless proof that the
          # Windows-built embedded server boots and answers. (`serve` was renamed
          # to `open` in 37e0f62d.) The interactive GUI install is deferred to
          # @@Alex on real hardware; there is no robust headless GUI smoke.
          exe="target/release/chan-desktop.exe"
          ws="$RUNNER_TEMP/chan-smoke-ws"   # outside the checkout: no VCS-parent refusal
          mkdir -p "$ws"
          ARGV0=chan CHAN_NO_DESKTOP_HANDOFF=1 "$exe" open \
            --no-browser --no-token --port 8799 "$ws" &
          srv=$!
          ok=
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8799/api/health | grep -q '"status":"ok"'; then
              ok=1; echo "embedded server answered /api/health"; break
            fi
            sleep 2
          done
          kill "$srv" 2>/dev/null || true
          if [ -z "$ok" ]; then
            echo "::error::chan-desktop embedded server did not answer /api/health"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: chan-desktop-${{ matrix.artifact_name }}
          path: chan/target/release/bundle/**/*
          if-no-files-found: error
