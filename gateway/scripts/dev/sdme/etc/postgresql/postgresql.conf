# Minimal dev postgresql-18 config for chan-psql (sdme).
#
# Listens on every interface so the gateway running on the macOS or
# Linux host can reach it at localhost:5432 through sdme's host
# networking. DEV ONLY.

data_directory = '/var/lib/postgresql/18/main'
hba_file       = '/etc/postgresql/18/main/pg_hba.conf'
ident_file     = '/etc/postgresql/18/main/pg_ident.conf'
external_pid_file = '/var/run/postgresql/18-main.pid'

listen_addresses = '*'
port             = 5432
max_connections  = 100
unix_socket_directories = '/var/run/postgresql'

ssl = off

shared_buffers = 128MB
dynamic_shared_memory_type = posix

max_wal_size = 1GB
min_wal_size = 80MB

log_destination     = 'stderr'
logging_collector   = off
log_line_prefix     = '%m [%p] %q%u@%d '
log_timezone        = 'UTC'

datestyle  = 'iso, mdy'
timezone   = 'UTC'

lc_messages = 'C.UTF-8'
lc_monetary = 'C.UTF-8'
lc_numeric  = 'C.UTF-8'
lc_time     = 'C.UTF-8'

default_text_search_config = 'pg_catalog.english'
