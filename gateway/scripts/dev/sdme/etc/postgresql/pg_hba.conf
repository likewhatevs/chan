# pg_hba.conf for chan-psql dev (sdme).
#
# DEV ONLY: accepts scram password auth from any address so the host
# (localhost, via sdme's host networking) can connect as `chan`. The
# prod file restricts to the private chan-svc zone bridge; this one
# does not. Do not use beyond a local throwaway container.

# TYPE  DATABASE  USER      ADDRESS       METHOD
local   all       postgres                peer
local   all       all                     peer
host    all       all       127.0.0.1/32  scram-sha-256
host    all       all       ::1/128       scram-sha-256
host    all       all       0.0.0.0/0     scram-sha-256
host    all       all       ::/0          scram-sha-256
