# Final database rollout phase: verify the exact migration/object inventory,
# install the least-privilege matrix, then publish the app-readable ready marker.
apiVersion: batch/v1
kind: Job
metadata:
  name: chan-gateway-database-reconcile
  labels:
    app.kubernetes.io/name: database-migrate
    app.kubernetes.io/part-of: chan-gateway
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database-migrate
        app.kubernetes.io/part-of: chan-gateway
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: reconcile
          image: postgres:16
          command: ["/opt/chan/reconcile-database-roles.sh"]
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: chan-gateway-migrate, key: DATABASE_URL } }
            - name: EXPECTED_SQLX_MIGRATION
              valueFrom: { configMapKeyRef: { name: chan-gateway-config, key: EXPECTED_SQLX_MIGRATION } }
            - name: DATABASE_ROLE_POLICY_VERSION
              valueFrom: { configMapKeyRef: { name: chan-gateway-config, key: DATABASE_ROLE_POLICY_VERSION } }
          volumeMounts:
            - name: database-roles
              mountPath: /opt/chan/reconcile-database-roles.sh
              subPath: reconcile-database-roles.sh
              readOnly: true
      volumes:
        - name: database-roles
          configMap:
            name: chan-gateway-database-roles
            defaultMode: 0555
