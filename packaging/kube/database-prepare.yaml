# First database rollout phase: invalidate readiness, rotate app credentials,
# remove unsafe role membership/default ACLs, and revoke runtime object access.
apiVersion: batch/v1
kind: Job
metadata:
  name: chan-gateway-database-prepare
  labels:
    app.kubernetes.io/name: database-migrate
    app.kubernetes.io/part-of: chan-gateway
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database-migrate
        app.kubernetes.io/part-of: chan-gateway
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: prepare
          image: postgres:16
          command: ["/opt/chan/prepare-database-roles.sh"]
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: chan-gateway-migrate, key: DATABASE_URL } }
            - name: IDENTITY_DATABASE_PASSWORD
              valueFrom: { secretKeyRef: { name: chan-gateway-migrate, key: IDENTITY_DATABASE_PASSWORD } }
            - name: PROFILE_DATABASE_PASSWORD
              valueFrom: { secretKeyRef: { name: chan-gateway-migrate, key: PROFILE_DATABASE_PASSWORD } }
          volumeMounts:
            - name: database-roles
              mountPath: /opt/chan/prepare-database-roles.sh
              subPath: prepare-database-roles.sh
              readOnly: true
      volumes:
        - name: database-roles
          configMap:
            name: chan-gateway-database-roles
            defaultMode: 0555
