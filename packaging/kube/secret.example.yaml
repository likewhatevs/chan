# EXAMPLE Secrets. Copy to secret.yaml and replace every value before applying;
# do NOT commit a filled-in copy (secret.yaml is gitignored by convention).
#
# Shared values are duplicated only into the workloads that consume them. The
# duplicates MUST match. Generate bearer tokens with `openssl rand -hex 32`.
# Admission keys are canonical unpadded base64url encodings of the raw 32-byte
# Ed25519 secret and public key; generate them with
# packaging/gateway/scripts/generate-admission-keypair.py.
apiVersion: v1
kind: Secret
metadata:
  name: chan-gateway-postgres
  labels:
    app.kubernetes.io/part-of: chan-gateway
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_migration_owner_password"
---
apiVersion: v1
kind: Secret
metadata:
  name: chan-gateway-migrate
  labels:
    app.kubernetes.io/part-of: chan-gateway
type: Opaque
stringData:
  # Database-owner URL. Only the migration Job may project this URL.
  DATABASE_URL: "postgres://chan_gateway_migrate:REPLACE_migration_owner_password@chan-gateway-postgres:5432/chan_gateway"
  # The prepare Job creates or rotates these non-DDL role passwords.
  IDENTITY_DATABASE_PASSWORD: "REPLACE_identity_database_password"
  PROFILE_DATABASE_PASSWORD: "REPLACE_profile_database_password"
---
apiVersion: v1
kind: Secret
metadata:
  name: chan-gateway-profile
  labels:
    app.kubernetes.io/part-of: chan-gateway
type: Opaque
stringData:
  DATABASE_URL: "postgres://chan_gateway_profile:REPLACE_profile_database_password@chan-gateway-postgres:5432/chan_gateway"
  PROFILE_AUTH_TOKEN: "REPLACE_shared_with_identity"
  PROFILE_ADMIN_TOKEN: "REPLACE_profile_api_operator_token"
  DEVSERVER_PROFILE_ADMIN_TOKEN: "REPLACE_profile_to_control_token"
---
apiVersion: v1
kind: Secret
metadata:
  name: chan-gateway-identity
  labels:
    app.kubernetes.io/part-of: chan-gateway
type: Opaque
stringData:
  DATABASE_URL: "postgres://chan_gateway_identity:REPLACE_identity_database_password@chan-gateway-postgres:5432/chan_gateway"
  PROFILE_AUTH_TOKEN: "REPLACE_shared_with_profile"
  IDENTITY_INTERNAL_TOKEN: "REPLACE_shared_with_proxy"
  DEVSERVER_ADMISSION_SIGNING_KEY: "REPLACE_base64url_raw_ed25519_secret"
  DEVSERVER_ADMISSION_VERIFYING_KEYS: "REPLACE_base64url_raw_ed25519_public"
  DEVSERVER_ENTRY_SIGNING_KEY: "REPLACE_base64url_raw_entry_ed25519_secret"
  IDENTITY_ADMIN_TOKEN: "REPLACE_identity_api_operator_token"
  DEVSERVER_IDENTITY_ADMIN_TOKEN: "REPLACE_identity_to_control_token"
  GITHUB_CLIENT_ID: "REPLACE"
  GITHUB_CLIENT_SECRET: "REPLACE"
---
apiVersion: v1
kind: Secret
metadata:
  name: chan-gateway-devserver-control
  labels:
    app.kubernetes.io/part-of: chan-gateway
type: Opaque
stringData:
  # Each verifier ring is current[;next]. No token may cross scopes.
  DEVSERVER_OPERATOR_ADMIN_TOKENS: "REPLACE_control_operator_token"
  DEVSERVER_IDENTITY_ADMIN_TOKENS: "REPLACE_identity_to_control_token"
  DEVSERVER_PROFILE_ADMIN_TOKENS: "REPLACE_profile_to_control_token"
  # This example provisions p1. A proxy id may have two tokens during rotation.
  DEVSERVER_PROXY_CREDENTIALS: "p1=REPLACE_proxy_p1_token"
  # One or two distinct public keys, current[;next], during signer rotation.
  DEVSERVER_ADMISSION_VERIFYING_KEYS: "REPLACE_base64url_raw_ed25519_public"
---
apiVersion: v1
kind: Secret
metadata:
  name: chan-gateway-devserver-proxy
  labels:
    app.kubernetes.io/part-of: chan-gateway
type: Opaque
stringData:
  IDENTITY_INTERNAL_TOKEN: "REPLACE_shared_with_identity"
  DEVSERVER_ENTRY_VERIFYING_KEYS: "REPLACE_base64url_raw_entry_ed25519_public"
  # Each proxy Deployment receives only the token for its DEVSERVER_PROXY_ID.
  DEVSERVER_PROXY_TOKEN: "REPLACE_proxy_p1_token"
---
apiVersion: v1
kind: Secret
metadata:
  name: chan-gateway-operator
  labels:
    app.kubernetes.io/part-of: chan-gateway
type: Opaque
stringData:
  CHAN_ADMIN_PROFILE_TOKEN: "REPLACE_profile_api_operator_token"
  CHAN_ADMIN_IDENTITY_TOKEN: "REPLACE_identity_api_operator_token"
  CHAN_ADMIN_OPERATOR_TOKEN: "REPLACE_control_operator_token"
