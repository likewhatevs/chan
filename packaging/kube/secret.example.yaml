# EXAMPLE Secret. Copy to secret.yaml and replace every value before applying;
# do NOT commit a filled-in copy (secret.yaml is gitignored by convention).
#
# The service-to-service bearers and the workspace-gate secret MUST match across
# the services that share them (see gateway/.agents/gateway.md "Service-to-service
# bearers"). Generate each token with: openssl rand -hex 32
#
#   PROFILE_AUTH_TOKEN        identity -> profile service API (shared)
#   PROFILE_ADMIN_TOKEN       admin CLI -> profile /v1/admin/*
#   IDENTITY_INTERNAL_TOKEN   devserver-proxy -> identity token-validate (must match)
#   WORKSPACE_GATE_SECRET     HS256 gate secret, identity mints / devserver-proxy
#                             verifies (must match)
#   WORKSPACE_ADMIN_TOKEN     identity + profile -> devserver-proxy /admin/v1/*
#
# GITHUB_CLIENT_ID/SECRET are placeholders so identity boots (it refuses to start
# with no OAuth provider configured). Real sign-in needs a real OAuth app whose
# callback is <PUBLIC_SCHEME>://id.<CHAN_DOMAIN>/auth/github/callback.
apiVersion: v1
kind: Secret
metadata:
  name: chan-gateway-secrets
  labels:
    app.kubernetes.io/part-of: chan-gateway
type: Opaque
stringData:
  # Connection string includes the Postgres password, so it is a secret.
  DATABASE_URL: "postgres://chan:REPLACE_DB_PASSWORD@chan-gateway-postgres:5432/chan_gateway"
  POSTGRES_PASSWORD: "REPLACE_DB_PASSWORD"

  PROFILE_AUTH_TOKEN: "REPLACE_openssl_rand_hex_32"
  PROFILE_ADMIN_TOKEN: "REPLACE_openssl_rand_hex_32"
  IDENTITY_INTERNAL_TOKEN: "REPLACE_openssl_rand_hex_32"
  WORKSPACE_GATE_SECRET: "REPLACE_openssl_rand_hex_32"
  WORKSPACE_ADMIN_TOKEN: "REPLACE_openssl_rand_hex_32"

  # Placeholder OAuth app; replace for real sign-in.
  GITHUB_CLIENT_ID: "dev-placeholder"
  GITHUB_CLIENT_SECRET: "dev-placeholder"
