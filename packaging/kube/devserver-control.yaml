# devserver-control: singleton, database-free control plane for the proxy
# fleet. Owns the dynamic proxy directory, the aggregate tunnel view, fleet
# admission, and command routing. Stateless; no Postgres.
#
# Two ports: 7003 carries the operator/consumer HTTP surface (/admin/v1/*,
# /healthz, /readyz); 7101 is the h2c proxy-control listener that every
# devserver-proxy node dials with DEVSERVER_PROXY_TOKEN.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chan-gateway-devserver-control
  labels:
    app.kubernetes.io/name: devserver-control
    app.kubernetes.io/part-of: chan-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devserver-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devserver-control
        app.kubernetes.io/part-of: chan-gateway
    spec:
      containers:
        - name: devserver-control
          # set <version> to the release tag you are deploying (see README.md).
          image: fiorix/chan-gateway-devserver-control:<version>
          # BIND_ADDR=0.0.0.0:7003 + PROXY_BIND_ADDR=0.0.0.0:7101 baked in;
          # URLs/tokens from ConfigMap/Secret.
          envFrom:
            - configMapRef: { name: chan-gateway-config }
            - secretRef: { name: chan-gateway-secrets }
          ports:
            - { name: http, containerPort: 7003 }
            - { name: control, containerPort: 7101 }
          readinessProbe:
            # /readyz holds 503 for the convergence window after a restart;
            # only a reconstructed fleet reports ready.
            httpGet: { path: /readyz, port: 7003 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 7003 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chan-gateway-devserver-control
  labels:
    app.kubernetes.io/part-of: chan-gateway
spec:
  # Internal surface only: identity, profile, and the admin CLI read
  # /admin/v1/* on :7003; proxy nodes connect their control stream to :7101.
  # Neither port belongs behind the public TLS terminator.
  selector:
    app.kubernetes.io/name: devserver-control
  ports:
    - { name: http, port: 7003, targetPort: 7003 }
    - { name: control, port: 7101, targetPort: 7101 }
