# Second database rollout phase: the pinned identity image runs owner-only DDL.
apiVersion: batch/v1
kind: Job
metadata:
  name: chan-gateway-database-migrate
  labels:
    app.kubernetes.io/name: database-migrate
    app.kubernetes.io/part-of: chan-gateway
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database-migrate
        app.kubernetes.io/part-of: chan-gateway
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: migrate
          # set <version> to the release tag you are deploying (see README.md).
          image: fiorix/chan-gateway-identity:<version>
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: chan-gateway-migrate, key: DATABASE_URL } }
            - { name: CHAN_GATEWAY_MIGRATIONS, value: only }
