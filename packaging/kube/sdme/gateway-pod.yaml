# sdme validation pod: the whole gateway stack as ONE Pod.
#
# sdme runs a multi-container Pod as a single systemd-nspawn container with one
# service per app, sharing a network namespace via localhost. So the five
# containers reach each other on 127.0.0.1 (no Service DNS needed) and the
# inter-service URLs are wired to loopback here, unlike the cluster manifests in
# the parent directory which use Service DNS names.
#
# Bring-up (privileged; see ../README.md for the full runbook):
#   sudo sdme kube secret create gateway-secrets \
#       --from-literal=DATABASE_URL=postgres://chan:chan@127.0.0.1:5432/chan_gateway \
#       --from-literal=POSTGRES_PASSWORD=chan \
#       --from-literal=PROFILE_AUTH_TOKEN=$(openssl rand -hex 32) \
#       --from-literal=PROFILE_ADMIN_TOKEN=$(openssl rand -hex 32) \
#       --from-literal=IDENTITY_INTERNAL_TOKEN=$(openssl rand -hex 32) \
#       --from-literal=DEVSERVER_ADMISSION_SIGNING_KEY=<base64url-key> \
#       --from-literal=DEVSERVER_ADMISSION_VERIFYING_KEYS=<controller-base64url-key-ring> \
#       --from-literal=DEVSERVER_OPERATOR_ADMIN_TOKENS=$(openssl rand -hex 32) \
#       --from-literal=DEVSERVER_IDENTITY_ADMIN_TOKEN=$(openssl rand -hex 32) \
#       --from-literal=DEVSERVER_PROFILE_ADMIN_TOKEN=$(openssl rand -hex 32) \
#       --from-literal=DEVSERVER_IDENTITY_ADMIN_TOKENS=<same-identity-token> \
#       --from-literal=DEVSERVER_PROFILE_ADMIN_TOKENS=<same-profile-token> \
#       --from-literal=DEVSERVER_ENTRY_SIGNING_KEY=<base64url-entry-secret> \
#       --from-literal=DEVSERVER_ENTRY_VERIFYING_KEYS=<base64url-entry-public> \
#       --from-literal=DEVSERVER_PROXY_CREDENTIALS=p1=<token> \
#       --from-literal=DEVSERVER_PROXY_TOKEN=<same-token> \
#       --from-literal=GITHUB_CLIENT_ID=dev-placeholder \
#       --from-literal=GITHUB_CLIENT_SECRET=dev-placeholder
#   sudo sdme kube apply -f packaging/kube/sdme/gateway-pod.yaml --base-fs <base>
#
# Image resolution: the five chan-gateway-* images must be reachable by the name
# below. Point default_kube_registry at a registry that holds them, or pre-load
# them, before apply (see ../README.md "Making the images available to sdme").
apiVersion: v1
kind: Pod
metadata:
  name: chan-gateway
  labels:
    app.kubernetes.io/part-of: chan-gateway
spec:
  restartPolicy: Always
  automountServiceAccountToken: false
  containers:
    # --- Postgres (identity's migration-only preflight owns DDL) ------------
    - name: postgres
      image: postgres:16
      imagePullPolicy: IfNotPresent
      env:
        - { name: POSTGRES_USER, value: "chan" }
        - { name: POSTGRES_DB, value: "chan_gateway" }
        - name: POSTGRES_PASSWORD
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: POSTGRES_PASSWORD } }
        - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
      volumeMounts:
        - { name: pgdata, mountPath: /var/lib/postgresql/data }
      readinessProbe:
        exec: { command: ["pg_isready", "-U", "chan", "-d", "chan_gateway"] }
        initialDelaySeconds: 3
        periodSeconds: 5

    # --- profile (:7001 internal) -------------------------------------------
    - name: profile
      image: chan-gateway-profile:dev
      imagePullPolicy: IfNotPresent
      # BIND_ADDR=0.0.0.0:7001 baked into the image. Tokens + DATABASE_URL from
      # the secret; the loopback admin URL inline (the controller owns the
      # aggregate /admin/v1/* tree).
      env:
        - { name: BIND_ADDR, value: "127.0.0.1:7001" }
        - { name: CHAN_GATEWAY_MIGRATIONS, value: external }
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DATABASE_URL } }
        - name: PROFILE_AUTH_TOKEN
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: PROFILE_AUTH_TOKEN } }
        - name: PROFILE_ADMIN_TOKEN
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: PROFILE_ADMIN_TOKEN } }
        - name: DEVSERVER_PROFILE_ADMIN_TOKEN
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_PROFILE_ADMIN_TOKEN } }
        - { name: DEVSERVER_ADMIN_URL, value: "http://127.0.0.1:7003" }
      readinessProbe:
        httpGet: { path: /healthz, port: 7001 }
        initialDelaySeconds: 3
        periodSeconds: 5

    # --- identity (:7000 public sign-in, :7004 proxy-only internal) ----------
    - name: identity
      image: chan-gateway-identity:dev
      imagePullPolicy: IfNotPresent
      # This local validation shape has no separate Job lifecycle. Run the
      # exact production binary once in migration-only mode, then exec its
      # external-migration app mode. A Postgres startup race restarts only this
      # container; migrations remain idempotent.
      command: ["/bin/sh", "-ec"]
      args:
        - |
          CHAN_GATEWAY_MIGRATIONS=only /usr/local/bin/chan-gateway-identity
          exec /usr/local/bin/chan-gateway-identity
      env:
        - { name: BIND_ADDR, value: "127.0.0.1:7000" }
        - { name: INTERNAL_BIND_ADDR, value: "127.0.0.1:7004" }
        - { name: CHAN_GATEWAY_MIGRATIONS, value: external }
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DATABASE_URL } }
        - name: PROFILE_AUTH_TOKEN
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: PROFILE_AUTH_TOKEN } }
        - name: IDENTITY_INTERNAL_TOKEN
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: IDENTITY_INTERNAL_TOKEN } }
        - name: DEVSERVER_ADMISSION_SIGNING_KEY
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_ADMISSION_SIGNING_KEY } }
        - name: DEVSERVER_ADMISSION_VERIFYING_KEYS
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_ADMISSION_VERIFYING_KEYS } }
        - name: DEVSERVER_ENTRY_SIGNING_KEY
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_ENTRY_SIGNING_KEY } }
        - name: DEVSERVER_IDENTITY_ADMIN_TOKEN
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_IDENTITY_ADMIN_TOKEN } }
        - name: GITHUB_CLIENT_ID
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: GITHUB_CLIENT_ID } }
        - name: GITHUB_CLIENT_SECRET
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: GITHUB_CLIENT_SECRET } }
        - { name: BASE_URL, value: "http://id.localtest.me" }
        - { name: DEVSERVER_PROXY_ORIGIN, value: "http://usr.localtest.me" }
        - { name: DEVSERVER_TUNNEL_ORIGIN, value: "http://usr.localtest.me" }
        - { name: COOKIE_SECURE, value: "false" }
        - { name: PROFILE_SERVICE_URL, value: "http://127.0.0.1:7001" }
        - { name: DEVSERVER_ADMIN_URL, value: "http://127.0.0.1:7003" }
      readinessProbe:
        httpGet: { path: /healthz, port: 7000 }
        initialDelaySeconds: 5
        periodSeconds: 5

    # --- devserver-control (:7003 admin HTTP + :7101 h2c proxy control) -----
    - name: devserver-control
      image: chan-gateway-devserver-control:dev
      imagePullPolicy: IfNotPresent
      # BIND_ADDR=0.0.0.0:7003 + PROXY_BIND_ADDR=0.0.0.0:7101 baked in.
      # Admin, proxy membership, and admission verification come from the secret.
      env:
        - { name: BIND_ADDR, value: "127.0.0.1:7003" }
        - { name: PROXY_BIND_ADDR, value: "127.0.0.1:7101" }
        - name: DEVSERVER_OPERATOR_ADMIN_TOKENS
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_OPERATOR_ADMIN_TOKENS } }
        - name: DEVSERVER_IDENTITY_ADMIN_TOKENS
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_IDENTITY_ADMIN_TOKENS } }
        - name: DEVSERVER_PROFILE_ADMIN_TOKENS
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_PROFILE_ADMIN_TOKENS } }
        - name: DEVSERVER_PROXY_CREDENTIALS
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_PROXY_CREDENTIALS } }
        - name: DEVSERVER_ADMISSION_VERIFYING_KEYS
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_ADMISSION_VERIFYING_KEYS } }
        - { name: DEVSERVER_PROXY_BASE_URL_TEMPLATE, value: "http://{proxy_id}.usr.localtest.me" }
        - { name: MAX_DEVSERVERS_PER_USER, value: "100" }
      readinessProbe:
        httpGet: { path: /readyz, port: 7003 }
        initialDelaySeconds: 3
        periodSeconds: 5

    # --- devserver-proxy (:7002 HTTP + :7100 h2c tunnel) --------------------
    - name: devserver-proxy
      image: chan-gateway-devserver-proxy:dev
      imagePullPolicy: IfNotPresent
      # BIND_ADDR=0.0.0.0:7002 + TUNNEL_BIND_ADDR=0.0.0.0:7100 baked in.
      env:
        - { name: BIND_ADDR, value: "127.0.0.1:7002" }
        - { name: TUNNEL_BIND_ADDR, value: "127.0.0.1:7100" }
        - name: IDENTITY_INTERNAL_TOKEN
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: IDENTITY_INTERNAL_TOKEN } }
        - name: DEVSERVER_ENTRY_VERIFYING_KEYS
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_ENTRY_VERIFYING_KEYS } }
        - name: DEVSERVER_PROXY_TOKEN
          valueFrom: { secretKeyRef: { name: gateway-secrets, key: DEVSERVER_PROXY_TOKEN } }
        - { name: DEVSERVER_TUNNEL_ORIGIN, value: "http://usr.localtest.me" }
        - { name: DEVSERVER_PROXY_BASE_URL, value: "http://p1.usr.localtest.me" }
        - { name: DASHBOARD_URL, value: "http://id.localtest.me/workspaces" }
        - { name: IDENTITY_URL, value: "http://127.0.0.1:7004" }
        - { name: IDENTITY_PUBLIC_ORIGIN, value: "http://id.localtest.me" }
        - { name: DEVSERVER_CONTROL_URL, value: "http://127.0.0.1:7101" }
        - { name: DEVSERVER_PROXY_ID, value: "p1" }
      readinessProbe:
        # The proxy gates health on the apex Host (the
        # DEVSERVER_TUNNEL_ORIGIN host), so the probe must send it.
        httpGet:
          path: /readyz
          port: 7002
          httpHeaders:
            - { name: Host, value: "usr.localtest.me" }
        initialDelaySeconds: 5
        periodSeconds: 5
  volumes:
    # Ephemeral DB: this pod is for health validation, not durable state.
    - name: pgdata
      emptyDir: {}
