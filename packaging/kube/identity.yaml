# identity-service: public OAuth2 sign-in at id.<domain>, serves the dashboard
# SPA, mints workspace-gate entry tokens. Postgres-backed sessions (migrates on
# boot), calls profile over HTTP. Refuses to start with no OAuth provider set
# (the Secret carries placeholder GitHub creds for boot).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chan-gateway-identity
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: chan-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity
        app.kubernetes.io/part-of: chan-gateway
    spec:
      containers:
        - name: identity
          # set <version> to the release tag you are deploying (see README.md).
          image: fiorix/chan-gateway-identity:<version>
          # BIND_ADDR=0.0.0.0:7000 baked in; URLs + tokens from ConfigMap/Secret.
          envFrom:
            - configMapRef: { name: chan-gateway-config }
            - secretRef: { name: chan-gateway-secrets }
          ports:
            - containerPort: 7000
          readinessProbe:
            httpGet: { path: /healthz, port: 7000 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 7000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chan-gateway-identity
  labels:
    app.kubernetes.io/part-of: chan-gateway
spec:
  # Public surface in front of a TLS terminator that routes id.<domain> here.
  selector:
    app.kubernetes.io/name: identity
  ports:
    - name: http
      port: 7000
      targetPort: 7000
