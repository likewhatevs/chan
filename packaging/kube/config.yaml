# Non-secret configuration shared by the gateway services. Every Deployment
# pulls this in with `envFrom: configMapRef`. A service reads only the variables
# it needs; the unused ones are inert (e.g. devserver-control ignores
# PROFILE_SERVICE_URL). Cross-service URLs use the Service DNS names defined in
# the per-service manifests; on a real cluster they resolve via kube-dns.
#
# This is the cluster shape. The sdme single-pod validation (packaging/kube/sdme/) wires
# the same variables to 127.0.0.1 instead, because one nspawn shares localhost.
apiVersion: v1
kind: ConfigMap
metadata:
  name: chan-gateway-config
  labels:
    app.kubernetes.io/part-of: chan-gateway
data:
  # Explicit public origins. No service derives deployment hostnames; each
  # origin below is a complete scheme://host value. http for this no-TLS
  # example stack. Public traffic terminates TLS before reaching the Services.
  # identity's canonical public origin.
  BASE_URL: "https://id.localtest.me"
  # Exact Origin accepted by proxy entry-exchange POSTs.
  IDENTITY_PUBLIC_ORIGIN: "https://id.localtest.me"
  # Proxy namespace origin advertised by discovery.
  DEVSERVER_PROXY_ORIGIN: "https://usr.localtest.me"
  # Tunnel ingress origin (`chan devserver --tunnel-url` dials its /v1/tunnel).
  DEVSERVER_TUNNEL_ORIGIN: "https://usr.localtest.me"
  # This proxy node's stable id and exact base origin. The origin must match
  # the controller's template expansion for the id.
  DEVSERVER_PROXY_ID: "p1"
  DEVSERVER_PROXY_BASE_URL: "https://p1.usr.localtest.me"
  # Controller-side template with exactly one {proxy_id} placeholder.
  DEVSERVER_PROXY_BASE_URL_TEMPLATE: "https://{proxy_id}.usr.localtest.me"
  # Where the proxy redirects a browser that opens a devserver root
  # without a gate credential.
  DASHBOARD_URL: "https://id.localtest.me/workspaces"
  # Session cookie Secure attribute. false so the cookie survives plain http in
  # this example; keep true outside the loopback-only sdme validation pod.
  COOKIE_SECURE: "true"

  # Inter-service URLs (Service DNS + container port).
  PROFILE_SERVICE_URL: "http://chan-gateway-profile:7001"
  # Internal identity API. The public identity Service has no internal port.
  IDENTITY_URL: "http://chan-gateway-identity-internal:7004"
  # identity + profile read the aggregate /admin/v1/* tree from the controller.
  DEVSERVER_ADMIN_URL: "http://chan-gateway-devserver-control:7003"
  # Each proxy node opens its h2c control session here. Kubernetes NetworkPolicy
  # does not encrypt it: the pod network MUST provide authenticated encryption.
  DEVSERVER_CONTROL_URL: "http://chan-gateway-devserver-control:7101"
  # Exact opt-in for non-loopback plaintext internal URLs. Setting it asserts
  # that the authenticated encrypted pod network is active; startup refuses
  # those URLs otherwise.
  CHAN_GATEWAY_INTERNAL_TRANSPORT: "protected-overlay"

  # Fleet-wide cap over active and pending devserver ids per user
  # (0 = unlimited and is not supported in production). Enforced by control.
  MAX_DEVSERVERS_PER_USER: "100"

  # Postgres bootstrap (non-secret pieces; the password lives in the Secret).
  # Dedicated database owner used only by Postgres bootstrap and the migration
  # Job. Runtime identity/profile URLs use separate non-DDL roles.
  POSTGRES_USER: "chan_gateway_migrate"
  POSTGRES_DB: "chan_gateway"
  # Must advance with gateway/migrations and the exact reconcile ACL matrix.
  EXPECTED_SQLX_MIGRATION: "15"
  DATABASE_ROLE_POLICY_VERSION: "1"
