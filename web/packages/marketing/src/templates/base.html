<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>{{title}}</title>
<meta name="description" content="{{description}}" />
<link rel="icon" type="image/png" href="/chan-favicon.png" />
<link rel="apple-touch-icon" href="/chan-favicon.png" />
<link rel="stylesheet" href="/assets/site.css" />
<script src="/assets/site.js" defer></script>
{{headExtra}}
</head>
<body class="{{bodyClass}}" data-mode="light">
<div class="site-shell">
  <header class="site-header">
    <a class="brand" href="/" aria-label="Chan home">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>chan</span>
    </a>
    <nav class="site-nav" aria-label="Site">
        {{siteNav}}
    </nav>
    <button class="theme-button" id="theme-toggle" type="button" aria-label="Toggle theme">
      <!-- Sun + moon SVGs match chan-desktop's titlebar toggle. The
           visible glyph is the theme you switch TO: sun in dark mode
           (click for light), moon in light mode (click for dark). -->
      <svg class="theme-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
      <svg class="theme-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main>
{{content}}
  </main>

  <footer class="site-footer">
    <span>© 2026 chan.app</span>
    <span>Chan is free, open source software. Made with love.</span>
  </footer>
</div>
</body>
</html>
