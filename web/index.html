<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Chan</title>
    <!-- Favicon: brand-orange ensō on transparent background.
         Source is chan-mark.png (the black silhouette used by the
         assistant button via CSS mask); chan-favicon.png is the
         same silhouette pre-tinted with --assistant-accent so it
         reads as the brand mark wherever the browser paints the
         icon. apple-touch-icon points at the same artwork so iOS
         home-screen and Safari pinned tabs match. -->
    <link rel="icon" type="image/png" href="/chan-favicon.png" />
    <link rel="apple-touch-icon" href="/chan-favicon.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
