<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover up-front so env(safe-area-inset-*) is
         non-zero from first paint. MobileShell tightens the value
         further on iOS / Android (maximum-scale=1 to stop input
         auto-zoom), but the bottom-inset value matters before
         MobileShell's onMount runs (the floating bar's calc reads
         it on first layout). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Chan</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="256x256" href="/chan-mark.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/chan-mark.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
