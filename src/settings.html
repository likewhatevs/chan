<!doctype html>
<html lang="en" data-mode="bone">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chan Desktop — Settings</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

</head>
<body>
  <div class="settings-wrap">
    <h2>Settings</h2>
    <p class="dim">Per-user configuration for Chan Desktop.</p>

    <div class="kv">
      <div class="k">Configuration file</div>
      <div class="v" id="cfg-path">…</div>

    <div class="row-buttons">
      <button class="btn" id="reveal">Reveal in folder</button>
      <button class="btn danger" id="forget">Forget all drives</button>
    </div>
  </div>

  <script src="settings.js"></script>
