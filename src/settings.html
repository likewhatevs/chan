<!doctype html>
<html lang="en" data-mode="bone">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chan Desktop — Settings</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>
  <div class="settings-wrap">
    <h2>Settings</h2>
    <p class="dim">Per-user configuration for Chan Desktop.</p>

    <div class="kv">
      <div class="k">Developer mode</div>
      <label class="check">
        <input type="checkbox" id="dev-mode" />
        <span>Run chan with verbose logging and open the console window</span>
      </label>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
